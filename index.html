<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Showroom 3D — Boutique</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0b; --panel:rgba(16,16,18,.78); --panel-border:rgba(255,255,255,.08);
    --zinc-100:#f4f4f5; --zinc-300:#d4d4d8; --zinc-400:#a1a1aa; --zinc-500:#71717a;
    --red:#e11d2a; --red-soft:rgba(225,29,42,.14);
    --serif:'Cormorant Garamond',Georgia,serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);font-family:var(--mono);color:var(--zinc-100);}
  canvas{display:block;}
  #app{position:fixed;inset:0;}

  /* ---------- Écran de démarrage ---------- */
  #start{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(120% 120% at 50% 0%,#161616 0%,#08080a 60%,#050506 100%);text-align:center;padding:24px;
    transition:opacity .6s ease;}
  #start.hide{opacity:0;pointer-events:none;}
  .brand-mark{font-family:var(--serif);letter-spacing:.18em;text-transform:uppercase;font-weight:600;}
  #start .name{font-size:clamp(34px,7vw,72px);line-height:1;margin-bottom:6px;}
  #start .sub{font-family:var(--mono);font-size:11px;letter-spacing:.42em;text-transform:uppercase;color:var(--zinc-500);margin-bottom:40px;}
  #start .rule{width:46px;height:1px;background:var(--red);margin:0 auto 40px;}
  #enter{font-family:var(--mono);font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--zinc-100);
    background:transparent;border:1px solid var(--panel-border);padding:16px 34px;cursor:pointer;border-radius:2px;
    transition:all .25s ease;position:relative;overflow:hidden;}
  #enter:hover{border-color:var(--red);color:#fff;background:var(--red-soft);}
  #enter .arrow{color:var(--red);margin-left:10px;}
  #start .hint{margin-top:30px;font-size:10px;letter-spacing:.16em;color:var(--zinc-500);line-height:2;text-transform:uppercase;}
  #loadbar{margin-top:26px;width:180px;height:2px;background:rgba(255,255,255,.08);overflow:hidden;border-radius:2px;}
  #loadbar i{display:block;height:100%;width:0%;background:var(--red);transition:width .3s ease;}

  /* ---------- HUD ---------- */
  #hud{position:fixed;inset:0;z-index:20;pointer-events:none;opacity:0;transition:opacity .6s ease .2s;}
  #hud.show{opacity:1;}
  .topbar{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;
    padding:20px 24px;background:linear-gradient(180deg,rgba(0,0,0,.45),transparent);}
  .topbar .store{font-family:var(--serif);font-size:22px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;}
  .topbar .store small{display:block;font-family:var(--mono);font-size:9px;letter-spacing:.34em;color:var(--zinc-500);margin-top:3px;}
  .cart{display:flex;align-items:center;gap:9px;font-size:11px;letter-spacing:.12em;color:var(--zinc-300);
    border:1px solid var(--panel-border);background:var(--panel);backdrop-filter:blur(8px);padding:9px 14px;border-radius:3px;}
  .cart b{color:var(--red);font-weight:600;}
  .crosshair{position:absolute;top:50%;left:50%;width:7px;height:7px;margin:-3.5px 0 0 -3.5px;border-radius:50%;
    background:rgba(255,255,255,.85);box-shadow:0 0 0 2px rgba(0,0,0,.35);transition:transform .15s,background .15s;}
  .crosshair.aim{transform:scale(1.9);background:var(--red);}
  .coords{position:absolute;bottom:16px;left:24px;font-size:10px;letter-spacing:.1em;color:var(--zinc-500);}
  .coords span{color:var(--zinc-300);}
  .ctrlhint{position:absolute;bottom:16px;right:24px;font-size:10px;letter-spacing:.12em;color:var(--zinc-500);text-align:right;line-height:1.9;text-transform:uppercase;}
  .ctrlhint kbd{font-family:var(--mono);background:rgba(255,255,255,.06);border:1px solid var(--panel-border);
    border-radius:3px;padding:1px 6px;color:var(--zinc-300);margin:0 1px;}

  /* ---------- Fiche produit ---------- */
  #card{position:fixed;top:0;right:0;height:100%;width:360px;max-width:86vw;z-index:30;
    background:var(--panel);backdrop-filter:blur(18px);border-left:1px solid var(--panel-border);
    transform:translateX(105%);transition:transform .42s cubic-bezier(.22,1,.36,1);pointer-events:auto;
    display:flex;flex-direction:column;}
  #card.open{transform:translateX(0);}
  #card .swatch{height:150px;position:relative;overflow:hidden;}
  #card .swatch::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(16,16,18,.9));}
  #card .close{position:absolute;top:16px;right:16px;z-index:2;width:30px;height:30px;border-radius:50%;
    background:rgba(0,0,0,.4);border:1px solid var(--panel-border);color:#fff;cursor:pointer;font-size:15px;line-height:1;
    display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);}
  #card .body{padding:26px 26px 20px;flex:1;overflow-y:auto;}
  #card .cat{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--red);margin-bottom:8px;}
  #card .name{font-family:var(--serif);font-size:30px;line-height:1.05;font-weight:600;margin-bottom:14px;}
  #card .price{font-family:var(--serif);font-size:24px;font-weight:500;margin-bottom:20px;}
  #card .desc{font-size:12px;line-height:1.8;color:var(--zinc-400);margin-bottom:24px;}
  #card .meta{border-top:1px solid var(--panel-border);padding-top:16px;margin-bottom:22px;}
  #card .meta .row{display:flex;justify-content:space-between;font-size:11px;letter-spacing:.05em;padding:7px 0;}
  #card .meta .row span:first-child{color:var(--zinc-500);text-transform:uppercase;letter-spacing:.14em;}
  #card .meta .row span:last-child{color:var(--zinc-200);}
  #card .sizes{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:26px;}
  #card .sizes button{font-family:var(--mono);font-size:11px;width:42px;height:38px;background:transparent;
    border:1px solid var(--panel-border);color:var(--zinc-300);cursor:pointer;border-radius:3px;transition:all .18s;}
  #card .sizes button:hover{border-color:var(--zinc-400);}
  #card .sizes button.sel{background:#fff;color:#000;border-color:#fff;}
  #card .add{width:100%;padding:15px;background:var(--red);color:#fff;border:none;cursor:pointer;border-radius:3px;
    font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;transition:filter .18s;}
  #card .add:hover{filter:brightness(1.12);}
  #card .add.done{background:#1c3a23;color:#7ee29a;}

  /* ---------- Contrôles tactiles ---------- */
  #touch{position:fixed;inset:0;z-index:18;display:none;pointer-events:none;}
  #touch.on{display:block;}
  #joy{position:absolute;bottom:34px;left:28px;width:118px;height:118px;border-radius:50%;
    border:1px solid var(--panel-border);background:rgba(255,255,255,.04);pointer-events:auto;backdrop-filter:blur(4px);}
  #joy .nub{position:absolute;top:50%;left:50%;width:48px;height:48px;margin:-24px 0 0 -24px;border-radius:50%;
    background:rgba(255,255,255,.16);border:1px solid var(--panel-border);transition:transform .05s;}
  #joy .lbl{position:absolute;bottom:-22px;left:0;right:0;text-align:center;font-size:9px;letter-spacing:.22em;color:var(--zinc-500);text-transform:uppercase;}
  .looknote{position:absolute;bottom:50px;right:30px;font-size:9px;letter-spacing:.18em;color:var(--zinc-500);text-transform:uppercase;text-align:right;line-height:1.8;}

  @media(max-width:640px){
    .topbar .store{font-size:17px;}
    .ctrlhint{display:none;}
    .coords{font-size:9px;left:14px;}
    .topbar{padding:14px 16px;}
  }
</style>
</head>
<body>
<div id="app"></div>

<!-- HUD -->
<div id="hud">
  <div class="topbar">
    <div class="store" id="storeName">BOUTIQUE<small id="storeTag">SHOWROOM 3D</small></div>
    <div class="cart">PANIER <b id="cartCount">0</b></div>
  </div>
  <div class="crosshair" id="cross"></div>
  <div class="coords">POS <span id="pos">0.0 / 0.0</span></div>
  <div class="ctrlhint">
    <div><kbd>Z</kbd><kbd>Q</kbd><kbd>S</kbd><kbd>D</kbd> / <kbd>↑↓←→</kbd> se déplacer</div>
    <div><kbd>Souris</kbd> regarder &nbsp; <kbd>Clic</kbd> inspecter &nbsp; <kbd>Échap</kbd> sortir</div>
  </div>
</div>

<!-- Fiche produit -->
<div id="card">
  <button class="close" id="cardClose">✕</button>
  <div class="swatch" id="cardSwatch"></div>
  <div class="body">
    <div class="cat" id="cardCat"></div>
    <div class="name" id="cardName"></div>
    <div class="price" id="cardPrice"></div>
    <div class="desc" id="cardDesc"></div>
    <div class="meta" id="cardMeta"></div>
    <div class="sizes" id="cardSizes"></div>
    <button class="add" id="cardAdd">Ajouter au panier</button>
  </div>
</div>

<!-- Contrôles tactiles -->
<div id="touch">
  <div id="joy"><div class="nub" id="joyNub"></div><div class="lbl">Déplacement</div></div>
  <div class="looknote">Glisser à droite<br>pour regarder<br>Toucher un article<br>pour l'inspecter</div>
</div>

<!-- Démarrage -->
<div id="start">
  <div class="brand-mark name" id="startName">BOUTIQUE</div>
  <div class="sub" id="startSub">Showroom Tridimensionnel</div>
  <div class="rule"></div>
  <button id="enter">Entrer dans la boutique <span class="arrow">→</span></button>
  <div class="hint" id="startHint">Chargement…</div>
  <div id="loadbar"><i></i></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.161.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

/* =========================================================================
   CONFIGURATION  —  personnalise librement le nom, la devise et le catalogue
   ========================================================================= */
const CONFIG = {
  storeName: "MAISON LÉA",
  tagline:   "PRÊT-À-PORTER",
  currency:  "€",
  // Palette de couleurs (nom -> hex) utilisée pour les vêtements 3D
  colors: {
    "Écru":"#efe7d6","Marine":"#23304f","Terracotta":"#b05c3e","Camel":"#c79a5b",
    "Indigo":"#2f3b63","Beige":"#cbb491","Blanc cassé":"#f2efe6","Olive":"#6f6f3c",
    "Anthracite":"#33343a","Bleu poudré":"#9fb3c8","Rouille":"#a0522d","Noir":"#26262a",
    "Bordeaux":"#5e2230","Sauge":"#9ca893"
  },
  // Catalogue produit (rattaché aux portants dans l'ordre)
  catalog: [
    {cat:"Chemises",  name:"Chemise en lin",      price:79,  matiere:"Lin lavé",          couleur:"Écru",       type:"shirt",  desc:"Chemise oversize en lin lavé, coupe fluide et col français. Idéale en toute saison."},
    {cat:"Tailoring", name:"Veste de tailleur",   price:189, matiere:"Laine mélangée",    couleur:"Marine",     type:"jacket", desc:"Veste structurée à revers cran, doublure intégrale. Une pièce vestiaire intemporelle."},
    {cat:"Robes",     name:"Robe midi plissée",   price:129, matiere:"Viscose",           couleur:"Terracotta", type:"dress",  desc:"Robe midi au plissé soleil, taille marquée par une ceinture fine."},
    {cat:"Maille",    name:"Pull col rond",       price:95,  matiere:"Laine mérinos",     couleur:"Camel",      type:"shirt",  desc:"Pull en mérinos extra-fin, maille douce et thermorégulante."},
    {cat:"Denim",     name:"Jean droit",          price:110, matiere:"Coton denim",       couleur:"Indigo",     type:"shirt",  desc:"Jean coupe droite, denim brut au délavage subtil. Cinq poches."},
    {cat:"Manteaux",  name:"Trench coat",         price:240, matiere:"Coton gabardine",   couleur:"Beige",      type:"coat",   desc:"Trench déperlant à double boutonnage, ceinture nouée et empiècement dos."},
    {cat:"Basiques",  name:"T-shirt coton bio",   price:39,  matiere:"Coton biologique",  couleur:"Blanc cassé",type:"shirt",  desc:"Le t-shirt parfait : col rond, coton bio peigné, finitions nettes."},
    {cat:"Jupes",     name:"Jupe plissée",        price:89,  matiere:"Polyester recyclé", couleur:"Olive",      type:"dress",  desc:"Jupe mi-longue plissée, tombé léger et taille élastiquée confortable."},
    {cat:"Manteaux",  name:"Manteau long",        price:295, matiere:"Laine vierge",      couleur:"Anthracite", type:"coat",   desc:"Manteau droit mi-mollet en laine vierge, col tailleur épuré."},
    {cat:"Blouses",   name:"Blouse en soie",      price:145, matiere:"Soie",              couleur:"Bleu poudré",type:"shirt",  desc:"Blouse fluide en soie lavée, manches ballon et boutons nacrés."},
    {cat:"Maille",    name:"Cardigan maille",     price:99,  matiere:"Alpaga",            couleur:"Rouille",    type:"jacket", desc:"Cardigan en alpaga, maille côtelée généreuse et poches plaquées."},
    {cat:"Pantalons", name:"Pantalon large",      price:105, matiere:"Lyocell",           couleur:"Noir",       type:"dress",  desc:"Pantalon palazzo taille haute, tombé impeccable en lyocell."},
    {cat:"Robes",     name:"Robe chemise",        price:135, matiere:"Tencel",            couleur:"Sauge",      type:"dress",  desc:"Robe chemise ceinturée, coupe portefeuille et col pointe."},
    {cat:"Tailoring", name:"Blazer croisé",       price:199, matiere:"Laine flanelle",    couleur:"Bordeaux",   type:"jacket", desc:"Blazer croisé en flanelle, six boutons et épaules légèrement marquées."}
  ]
};

/* =========================================================================
   SCÈNE / RENDU
   ========================================================================= */
const app = document.getElementById('app');
const W = 14, D = 11, H = 3.4;            // dimensions de la boutique (m)
const HALFW = W/2, HALFD = D/2;

const scene = new THREE.Scene();
scene.background = new THREE.Color('#0c0c0e');

const camera = new THREE.PerspectiveCamera(62, innerWidth/innerHeight, 0.05, 120);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.outputColorSpace = THREE.SRGBColorSpace;
app.appendChild(renderer.domElement);

const interactables = [];   // meshes cliquables (vêtements)
const obstacles = [];       // boîtes XZ pour la collision

/* =========================================================================
   LUMIÈRES
   ========================================================================= */
scene.add(new THREE.HemisphereLight('#e9eef5', '#3a3530', 0.55));
scene.add(new THREE.AmbientLight('#ffffff', 0.18));

// Lumière du jour à travers la vitrine (porte les ombres)
const sun = new THREE.DirectionalLight('#fff4e0', 1.05);
sun.position.set(2.5, 7, 9);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near = 1; sun.shadow.camera.far = 30;
sun.shadow.camera.left = -10; sun.shadow.camera.right = 10;
sun.shadow.camera.top = 10; sun.shadow.camera.bottom = -10;
sun.shadow.bias = -0.0004;
scene.add(sun);

// Spots chauds d'ambiance (sans ombre, pour la perf)
function spot(x,z,color,intensity){
  const s = new THREE.SpotLight(color, intensity, 11, Math.PI/4, 0.6, 1.2);
  s.position.set(x, H-0.15, z);
  s.target.position.set(x, 0, z);
  scene.add(s); scene.add(s.target);
  return s;
}
spot(-4.5,3.8,'#ffe7c2',24); spot(4,3.5,'#ffe7c2',24);
spot(-3.2,0.2,'#fff1da',20); spot(2.6,-0.3,'#fff1da',20);
spot(0,-4.6,'#ffe7c2',22);

/* =========================================================================
   TEXTURES PROCÉDURALES (aucune image externe)
   ========================================================================= */
function woodTexture(){
  const c = document.createElement('canvas'); c.width=c.height=512;
  const x = c.getContext('2d');
  x.fillStyle='#a87f54'; x.fillRect(0,0,512,512);
  for(let i=0;i<512;i++){            // grain
    x.strokeStyle=`rgba(${90+Math.random()*40},${60+Math.random()*30},${30+Math.random()*20},${Math.random()*0.12})`;
    x.beginPath(); x.moveTo(0,i); x.lineTo(512,i+(Math.random()*4-2)); x.stroke();
  }
  for(let p=0;p<512;p+=64){          // joints de lames
    x.fillStyle='rgba(40,26,14,0.55)'; x.fillRect(0,p,512,2);
  }
  const t = new THREE.CanvasTexture(c);
  t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(7,5);
  t.colorSpace=THREE.SRGBColorSpace;
  return t;
}
function brandTexture(){
  const c = document.createElement('canvas'); c.width=1024; c.height=420;
  const x=c.getContext('2d');
  x.fillStyle='#161412'; x.fillRect(0,0,1024,420);
  x.fillStyle='#e7e2d6'; x.textAlign='center'; x.textBaseline='middle';
  x.font='600 130px Georgia, "Times New Roman", serif';
  x.fillText(CONFIG.storeName,512,180);
  x.fillStyle='#e11d2a'; x.fillRect(462,265,100,3);
  x.fillStyle='#8a857a'; x.font='40px Georgia, serif';
  x.fillText(CONFIG.tagline,512,320);
  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; return t;
}

/* =========================================================================
   STRUCTURE DE LA BOUTIQUE
   ========================================================================= */
const matFloor = new THREE.MeshStandardMaterial({map:woodTexture(),roughness:0.7,metalness:0.05});
const floor = new THREE.Mesh(new THREE.PlaneGeometry(W,D), matFloor);
floor.rotation.x=-Math.PI/2; floor.receiveShadow=true; scene.add(floor);

const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(W,D),
  new THREE.MeshStandardMaterial({color:'#f3f0ea',roughness:0.95}));
ceiling.rotation.x=Math.PI/2; ceiling.position.y=H; scene.add(ceiling);

const matWall = new THREE.MeshStandardMaterial({color:'#ece6db',roughness:0.95});
const matAccent = new THREE.MeshStandardMaterial({color:'#1c1b1a',roughness:0.9});
function wall(w,h,x,y,z,ry,mat){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,0.12),mat||matWall);
  m.position.set(x,y,z); m.rotation.y=ry; m.receiveShadow=true; m.castShadow=true; scene.add(m); return m;
}
wall(W,H,0,H/2,-HALFD,0,matAccent);          // mur du fond (sombre, signature)
wall(D,H,-HALFW,H/2,0,Math.PI/2);            // mur gauche
wall(D,H,HALFW,H/2,0,Math.PI/2);             // mur droit
// Façade vitrine : deux piliers + bandeau, le reste est une vitre
wall(2.4,H,-HALFW+1.2,H/2,HALFD,0);
wall(2.4,H,HALFW-1.2,H/2,HALFD,0);
wall(W,0.6,0,H-0.3,HALFD,0);                 // bandeau haut
const glass = new THREE.Mesh(new THREE.PlaneGeometry(W-4.6,H-0.6),
  new THREE.MeshPhysicalMaterial({color:'#bcd3e0',transparent:true,opacity:0.12,roughness:0.05,metalness:0,transmission:0.6}));
glass.position.set(0,(H-0.6)/2,HALFD-0.05); glass.rotation.y=Math.PI; scene.add(glass);

// Enseigne de marque sur le mur du fond
const sign = new THREE.Mesh(new THREE.PlaneGeometry(5.2,2.13),
  new THREE.MeshBasicMaterial({map:brandTexture()}));
sign.position.set(0,2.15,-HALFD+0.08); scene.add(sign);

// Rails lumineux au plafond (décor)
const trackMat = new THREE.MeshStandardMaterial({color:'#2a2a2c',roughness:0.4,metalness:0.7});
for(const tz of [-3.5,-0.5,2.5]){
  const t=new THREE.Mesh(new THREE.BoxGeometry(W-1.5,0.06,0.06),trackMat);
  t.position.set(0,H-0.05,tz); scene.add(t);
  for(let i=-3;i<=3;i++){
    const lamp=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.07,0.12,12),
      new THREE.MeshStandardMaterial({color:'#1a1a1c',emissive:'#fff0d4',emissiveIntensity:0.7}));
    lamp.position.set(i*1.9,H-0.16,tz); scene.add(lamp);
  }
}

/* =========================================================================
   VÊTEMENTS  (silhouettes extrudées) + données produit
   ========================================================================= */
function garmentShape(type){
  let sw,lw,len;
  if(type==='dress'){sw=0.30;lw=0.40;len=1.05;}
  else if(type==='coat'){sw=0.34;lw=0.34;len=0.95;}
  else if(type==='jacket'){sw=0.34;lw=0.30;len=0.70;}
  else {sw=0.30;lw=0.26;len=0.60;}           // shirt / pull / t-shirt
  const s=new THREE.Shape();
  s.moveTo(-sw,0);
  s.lineTo(-sw-0.06,-0.12);
  s.lineTo(-sw+0.07,-0.20);
  s.lineTo(-lw,-len);
  s.lineTo(lw,-len);
  s.lineTo(sw-0.07,-0.20);
  s.lineTo(sw+0.06,-0.12);
  s.lineTo(sw,0);
  s.lineTo(0.09,0.03);
  s.quadraticCurveTo(0,-0.05,-0.09,0.03);
  s.closePath();
  return new THREE.ExtrudeGeometry(s,{depth:0.06,bevelEnabled:true,bevelThickness:0.015,bevelSize:0.015,bevelSegments:1});
}
const geoCache={};
function garmentGeo(type){ return geoCache[type] || (geoCache[type]=garmentShape(type)); }

let catIndex=0;
function makeGarment(barY){
  const p = CONFIG.catalog[catIndex % CONFIG.catalog.length]; catIndex++;
  const hex = CONFIG.colors[p.couleur] || '#cccccc';
  const mesh = new THREE.Mesh(garmentGeo(p.type),
    new THREE.MeshStandardMaterial({color:hex,roughness:0.88,metalness:0.0,side:THREE.DoubleSide}));
  mesh.castShadow=true;
  const len = (p.type==='dress'?1.05:p.type==='coat'?0.95:p.type==='jacket'?0.70:0.60);
  mesh.position.y = barY - 0.02;
  mesh.userData = {product:p, hex, baseColor:hex};
  // crochet de cintre
  const hook=new THREE.Mesh(new THREE.TorusGeometry(0.04,0.008,8,16,Math.PI),
    new THREE.MeshStandardMaterial({color:'#cfcfcf',metalness:0.9,roughness:0.3}));
  hook.position.set(0,barY+0.02,0.03); hook.rotation.x=Math.PI/2;
  const g=new THREE.Group(); g.add(mesh); g.add(hook);
  g.userData.clickTarget=mesh;
  interactables.push(mesh);
  return {group:g,len};
}

const railMat = new THREE.MeshStandardMaterial({color:'#bdbdbd',metalness:0.85,roughness:0.35});
const postMat = new THREE.MeshStandardMaterial({color:'#3a3a3c',metalness:0.6,roughness:0.5});

// Portant mural (le long d'un mur, vêtements face à la pièce)
function wallRail(x,z,len,faceX){
  const barY=1.55;
  const bar=new THREE.Mesh(new THREE.CylinderGeometry(0.022,0.022,len,12),railMat);
  bar.rotation.x=Math.PI/2; bar.position.set(x,barY,z); scene.add(bar);
  // supports
  for(const dz of [-len/2+0.1,len/2-0.1]){
    const br=new THREE.Mesh(new THREE.BoxGeometry(0.3,0.04,0.04),postMat);
    br.position.set(x+faceX*0.15,barY,z+dz); scene.add(br);
  }
  const n=Math.floor(len/0.34);
  for(let i=0;i<n;i++){
    const {group}=makeGarment(barY);
    group.position.set(x,0,z-len/2+0.22+i*0.34);
    group.rotation.y = faceX>0 ? -Math.PI/2 : Math.PI/2;   // face à la pièce
    scene.add(group);
  }
  obstacles.push({minX:x-0.3,maxX:x+0.3,minZ:z-len/2-0.1,maxZ:z+len/2+0.1});
}

// Portant rond central
function roundRack(x,z){
  const barY=1.55, r=0.85;
  const ring=new THREE.Mesh(new THREE.TorusGeometry(r,0.022,12,48),railMat);
  ring.rotation.x=Math.PI/2; ring.position.set(x,barY,z); scene.add(ring);
  const pole=new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.03,barY,12),postMat);
  pole.position.set(x,barY/2,z); scene.add(pole);
  const base=new THREE.Mesh(new THREE.CylinderGeometry(0.32,0.36,0.04,24),postMat);
  base.position.set(x,0.02,z); base.receiveShadow=true; scene.add(base);
  const n=12;
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2;
    const {group}=makeGarment(barY);
    group.position.set(x+Math.cos(a)*r,0,z+Math.sin(a)*r);
    group.rotation.y=-a+Math.PI/2;
    scene.add(group);
  }
  obstacles.push({minX:x-r-0.3,maxX:x+r+0.3,minZ:z-r-0.3,maxZ:z+r+0.3});
}

// Portant droit (gondole) avec deux barres
function straightRack(x,z,len){
  const barY=1.5;
  for(const px of [-0.5,0.5]){
    const bar=new THREE.Mesh(new THREE.CylinderGeometry(0.022,0.022,len,12),railMat);
    bar.rotation.z=Math.PI/2; bar.position.set(x+px,barY,z); scene.add(bar);
  }
  for(const dx of [-len/2,len/2]){           // montants en T
    const pole=new THREE.Mesh(new THREE.CylinderGeometry(0.028,0.028,barY,12),postMat);
    pole.position.set(x+dx,barY/2,z); scene.add(pole);
    const foot=new THREE.Mesh(new THREE.BoxGeometry(0.9,0.05,0.18),postMat);
    foot.position.set(x+dx,0.03,z); foot.receiveShadow=true; scene.add(foot);
  }
  const n=Math.floor(len/0.32);
  for(const px of [-0.5,0.5])
    for(let i=0;i<n;i++){
      const {group}=makeGarment(barY);
      group.position.set(x-len/2+0.2+i*0.32, 0, z+px);
      group.rotation.y = px>0?0:Math.PI;
      scene.add(group);
    }
  obstacles.push({minX:x-len/2-0.2,maxX:x+len/2+0.2,minZ:z-0.7,maxZ:z+0.7});
}

// Étagère murale avec piles de vêtements pliés
function shelfUnit(x,z){
  const unit=new THREE.Group(); unit.position.set(x,0,z);
  const fr=new THREE.MeshStandardMaterial({color:'#6b4f33',roughness:0.7});
  const back=new THREE.Mesh(new THREE.BoxGeometry(1.9,2.2,0.06),fr);
  back.position.set(0,1.1,-0.02); unit.add(back);
  const colors=Object.values(CONFIG.colors);
  let ci=0;
  for(const sy of [0.45,1.05,1.65]){
    const shelf=new THREE.Mesh(new THREE.BoxGeometry(1.9,0.05,0.5),fr);
    shelf.position.set(0,sy,0.22); shelf.castShadow=true; shelf.receiveShadow=true; unit.add(shelf);
    for(const sx of [-0.6,0,0.6]){
      const stack=2+Math.floor(Math.random()*2);
      for(let k=0;k<stack;k++){
        const cl=new THREE.Mesh(new THREE.BoxGeometry(0.46,0.07,0.4),
          new THREE.MeshStandardMaterial({color:colors[ci++%colors.length],roughness:0.9}));
        cl.position.set(sx,sy+0.06+k*0.075,0.22); cl.castShadow=true; unit.add(cl);
      }
    }
  }
  scene.add(unit);
  obstacles.push({minX:x-1,maxX:x+1,minZ:z-0.1,maxZ:z+0.55});
}

// Mannequin (buste sur pied) habillé d'une couleur
function mannequin(x,z,ry,colorName){
  const g=new THREE.Group(); g.position.set(x,0,z); g.rotation.y=ry;
  const col=CONFIG.colors[colorName]||'#d9d4c8';
  const mat=new THREE.MeshStandardMaterial({color:col,roughness:0.6,metalness:0.05});
  // buste par révolution (profil taille->épaules)
  const pts=[
    new THREE.Vector2(0.0,0.0),new THREE.Vector2(0.16,0.02),new THREE.Vector2(0.20,0.12),
    new THREE.Vector2(0.17,0.32),new THREE.Vector2(0.21,0.48),new THREE.Vector2(0.24,0.6),
    new THREE.Vector2(0.20,0.7),new THREE.Vector2(0.08,0.74),new THREE.Vector2(0.0,0.74)
  ];
  const torso=new THREE.Mesh(new THREE.LatheGeometry(pts,28),mat);
  torso.position.y=0.95; torso.castShadow=true; g.add(torso);
  const neck=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.07,0.12,16),
    new THREE.MeshStandardMaterial({color:'#3a3a3c',roughness:0.5}));
  neck.position.y=1.74; g.add(neck);
  const pole=new THREE.Mesh(new THREE.CylinderGeometry(0.025,0.025,0.95,12),postMat);
  pole.position.y=0.475; g.add(pole);
  const base=new THREE.Mesh(new THREE.CylinderGeometry(0.26,0.3,0.04,24),postMat);
  base.position.y=0.02; base.receiveShadow=true; g.add(base);
  scene.add(g);
  obstacles.push({minX:x-0.35,maxX:x+0.35,minZ:z-0.35,maxZ:z+0.35});
}

// Comptoir caisse
function counter(x,z){
  const g=new THREE.Group(); g.position.set(x,0,z);
  const woodM=new THREE.MeshStandardMaterial({color:'#5a4632',roughness:0.6});
  const topM=new THREE.MeshStandardMaterial({color:'#2a2a2c',roughness:0.4,metalness:0.3});
  const body=new THREE.Mesh(new THREE.BoxGeometry(1.9,0.95,0.7),woodM);
  body.position.set(0,0.475,0); body.castShadow=true; body.receiveShadow=true; g.add(body);
  const top=new THREE.Mesh(new THREE.BoxGeometry(2.0,0.06,0.8),topM);
  top.position.set(0,0.98,0); top.castShadow=true; g.add(top);
  const reg=new THREE.Mesh(new THREE.BoxGeometry(0.4,0.22,0.3),
    new THREE.MeshStandardMaterial({color:'#101012',roughness:0.3,emissive:'#102a3a',emissiveIntensity:0.4}));
  reg.position.set(0.5,1.12,0); g.add(reg);
  scene.add(g);
  obstacles.push({minX:x-1.05,maxX:x+1.05,minZ:z-0.45,maxZ:z+0.45});
}

// Cabine d'essayage avec rideau et miroir
function fittingRoom(x,z){
  const g=new THREE.Group(); g.position.set(x,0,z);
  const fr=new THREE.MeshStandardMaterial({color:'#bbb1a0',roughness:0.9});
  const side=new THREE.Mesh(new THREE.BoxGeometry(0.08,2.3,1.4),fr);
  side.position.set(-0.7,1.15,0); side.castShadow=true; g.add(side);
  const side2=side.clone(); side2.position.x=0.7; g.add(side2);
  const topb=new THREE.Mesh(new THREE.BoxGeometry(1.48,0.12,1.4),fr);
  topb.position.set(0,2.24,0); g.add(topb);
  const curtain=new THREE.Mesh(new THREE.PlaneGeometry(1.4,2.2),
    new THREE.MeshStandardMaterial({color:'#5e2230',roughness:0.95,side:THREE.DoubleSide}));
  curtain.position.set(0,1.15,0.7); g.add(curtain);
  const mirror=new THREE.Mesh(new THREE.PlaneGeometry(0.55,1.6),
    new THREE.MeshStandardMaterial({color:'#cdd6dc',metalness:0.9,roughness:0.08}));
  mirror.position.set(0,1.15,-0.68); g.add(mirror);
  scene.add(g);
  obstacles.push({minX:x-0.75,maxX:x+0.75,minZ:z-0.75,maxZ:z+0.75});
}

/* ----- AGENCEMENT DE LA BOUTIQUE ----- */
wallRail(-HALFW+0.45, -0.5, 5.0, +1);      // mur gauche
wallRail( HALFW-0.45, -1.5, 3.0, -1);      // mur droit (partie fond)
roundRack(-3.2, 0.6);
straightRack(2.4, -0.4, 2.6);
shelfUnit(-2.0, -HALFD+0.4);
shelfUnit( 2.0, -HALFD+0.4);
mannequin(-4.6, 3.9,  Math.PI,        "Marine");
mannequin(-2.9, 4.2,  Math.PI*0.86,   "Terracotta");
mannequin( 3.4, 4.0,  Math.PI*1.1,    "Camel");
counter(4.4, 3.0);
fittingRoom(-5.4, -4.0);

/* =========================================================================
   JOUEUR / CONTRÔLES
   ========================================================================= */
const player = {
  pos: new THREE.Vector3(0, 1.6, HALFD-1.6),
  vel: new THREE.Vector3(),
  yaw: 0,            // 0 = regarde vers -Z (intérieur)
  pitch: 0,
  radius: 0.34
};
const keys = {};
const SPEED = 3.4, ACCEL = 14, DAMP = 10, SENS = 0.0022;
let locked = false, started = false;

const isMobile = matchMedia('(pointer:coarse)').matches || /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);

addEventListener('keydown',e=>{keys[e.code]=true;});
addEventListener('keyup',e=>{keys[e.code]=false;});

// Pointer lock (desktop)
renderer.domElement.addEventListener('click',()=>{
  if(!started) return;
  if(isMobile) return;
  if(!locked) renderer.domElement.requestPointerLock();
});
document.addEventListener('pointerlockchange',()=>{
  locked = document.pointerLockElement === renderer.domElement;
});
document.addEventListener('mousemove',e=>{
  if(!locked) return;
  player.yaw   -= e.movementX*SENS;
  player.pitch -= e.movementY*SENS;
  player.pitch = Math.max(-1.4,Math.min(1.4,player.pitch));
});

// Interaction desktop : clic au centre quand verrouillé
renderer.domElement.addEventListener('mousedown',e=>{
  if(locked) raycastFrom(0,0);
});

/* ----- Contrôles tactiles (mobile) ----- */
const joy = {active:false,id:null,cx:0,cy:0,dx:0,dy:0};
const joyEl=document.getElementById('joy'), joyNub=document.getElementById('joyNub');
const look = {active:false,id:null,lx:0,ly:0,moved:0,sx:0,sy:0,t:0};

function touchStart(e){
  for(const t of e.changedTouches){
    const r=joyEl.getBoundingClientRect();
    if(t.clientX>=r.left-20&&t.clientX<=r.right+20&&t.clientY>=r.top-20&&t.clientY<=r.bottom+20&&!joy.active){
      joy.active=true; joy.id=t.identifier; joy.cx=r.left+r.width/2; joy.cy=r.top+r.height/2;
      updateJoy(t.clientX,t.clientY);
    } else if(!look.active){
      look.active=true; look.id=t.identifier; look.lx=t.clientX; look.ly=t.clientY;
      look.sx=t.clientX; look.sy=t.clientY; look.moved=0; look.t=performance.now();
    }
  }
}
function touchMove(e){
  for(const t of e.changedTouches){
    if(joy.active&&t.identifier===joy.id) updateJoy(t.clientX,t.clientY);
    else if(look.active&&t.identifier===look.id){
      const dx=t.clientX-look.lx, dy=t.clientY-look.ly;
      player.yaw-=dx*0.005; player.pitch-=dy*0.005;
      player.pitch=Math.max(-1.4,Math.min(1.4,player.pitch));
      look.lx=t.clientX; look.ly=t.clientY;
      look.moved+=Math.abs(dx)+Math.abs(dy);
    }
  }
  e.preventDefault();
}
function touchEnd(e){
  for(const t of e.changedTouches){
    if(joy.active&&t.identifier===joy.id){joy.active=false;joy.dx=0;joy.dy=0;joyNub.style.transform='translate(0,0)';}
    else if(look.active&&t.identifier===look.id){
      look.active=false;
      // tap (peu de mouvement, court) -> inspecter à l'endroit touché
      if(look.moved<12 && performance.now()-look.t<350){
        const nx=(look.sx/innerWidth)*2-1, ny=-(look.sy/innerHeight)*2+1;
        raycastFrom(nx,ny);
      }
    }
  }
}
function updateJoy(px,py){
  let dx=px-joy.cx, dy=py-joy.cy; const max=44; const d=Math.hypot(dx,dy);
  if(d>max){dx=dx/d*max; dy=dy/d*max;}
  joy.dx=dx/max; joy.dy=dy/max;
  joyNub.style.transform=`translate(${dx}px,${dy}px)`;
}
addEventListener('touchstart',touchStart,{passive:false});
addEventListener('touchmove',touchMove,{passive:false});
addEventListener('touchend',touchEnd);
addEventListener('touchcancel',touchEnd);

/* =========================================================================
   RAYCAST / FICHE PRODUIT
   ========================================================================= */
const raycaster = new THREE.Raycaster();
const ndc = new THREE.Vector2();
let highlighted=null;

function raycastFrom(nx,ny){
  ndc.set(nx,ny);
  raycaster.setFromCamera(ndc,camera);
  const hits=raycaster.intersectObjects(interactables,false);
  if(hits.length && hits[0].distance<6) openCard(hits[0].object);
}

const cardEl=document.getElementById('card');
let selectedSize=null, currentProduct=null;
function openCard(mesh){
  const p=mesh.userData.product; currentProduct=p; selectedSize=null;
  document.getElementById('cardCat').textContent=p.cat;
  document.getElementById('cardName').textContent=p.name;
  document.getElementById('cardPrice').textContent=p.price+' '+CONFIG.currency;
  document.getElementById('cardDesc').textContent=p.desc;
  document.getElementById('cardSwatch').style.background=
    `linear-gradient(135deg,${mesh.userData.hex},${shade(mesh.userData.hex,-25)})`;
  document.getElementById('cardMeta').innerHTML=
    `<div class="row"><span>Matière</span><span>${p.matiere}</span></div>`+
    `<div class="row"><span>Coloris</span><span>${p.couleur}</span></div>`+
    `<div class="row"><span>Référence</span><span>${refCode(p)}</span></div>`;
  const sizes=['XS','S','M','L','XL'];
  const sz=document.getElementById('cardSizes'); sz.innerHTML='';
  sizes.forEach(s=>{
    const b=document.createElement('button'); b.textContent=s;
    b.onclick=()=>{[...sz.children].forEach(c=>c.classList.remove('sel'));b.classList.add('sel');selectedSize=s;};
    sz.appendChild(b);
  });
  const add=document.getElementById('cardAdd');
  add.textContent='Ajouter au panier'; add.classList.remove('done');
  cardEl.classList.add('open');
}
document.getElementById('cardClose').onclick=()=>cardEl.classList.remove('open');
document.getElementById('cardAdd').onclick=function(){
  if(!selectedSize){ this.textContent='Choisissez une taille'; return; }
  cartN++; document.getElementById('cartCount').textContent=cartN;
  this.textContent='✓ Ajouté ('+selectedSize+')'; this.classList.add('done');
};
let cartN=0;
function refCode(p){return (p.cat.slice(0,2)+p.name.replace(/[^A-Za-z]/g,'').slice(0,3)).toUpperCase()+'-'+p.price;}
function shade(hex,pct){
  const n=parseInt(hex.slice(1),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  r=Math.max(0,Math.min(255,r+pct));g=Math.max(0,Math.min(255,g+pct));b=Math.max(0,Math.min(255,b+pct));
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

/* =========================================================================
   BOUCLE DE RENDU
   ========================================================================= */
const clock=new THREE.Clock();
const forward=new THREE.Vector3(), right=new THREE.Vector3(), up=new THREE.Vector3(0,1,0);
const move=new THREE.Vector3();
const crossEl=document.getElementById('cross'), posEl=document.getElementById('pos');

function resolveCollision(){
  const r=player.radius;
  // murs
  player.pos.x=Math.max(-HALFW+r,Math.min(HALFW-r,player.pos.x));
  player.pos.z=Math.max(-HALFD+r,Math.min(HALFD-r,player.pos.z));
  // obstacles (AABB élargie)
  for(const o of obstacles){
    const minX=o.minX-r,maxX=o.maxX+r,minZ=o.minZ-r,maxZ=o.maxZ+r;
    if(player.pos.x>minX&&player.pos.x<maxX&&player.pos.z>minZ&&player.pos.z<maxZ){
      const dL=player.pos.x-minX,dR=maxX-player.pos.x,dB=player.pos.z-minZ,dT=maxZ-player.pos.z;
      const m=Math.min(dL,dR,dB,dT);
      if(m===dL)player.pos.x=minX; else if(m===dR)player.pos.x=maxX;
      else if(m===dB)player.pos.z=minZ; else player.pos.z=maxZ;
    }
  }
}

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);

  camera.rotation.set(player.pitch,player.yaw,0,'YXZ');
  camera.getWorldDirection(forward); forward.y=0; forward.normalize();
  right.crossVectors(forward,up).normalize();

  move.set(0,0,0);
  if(started){
    if(keys['KeyW']||keys['KeyZ']||keys['ArrowUp'])    move.add(forward);
    if(keys['KeyS']||keys['ArrowDown'])                move.sub(forward);
    if(keys['KeyD']||keys['ArrowRight'])               move.add(right);
    if(keys['KeyA']||keys['KeyQ']||keys['ArrowLeft'])  move.sub(right);
    if(joy.active){ move.addScaledVector(forward,-joy.dy); move.addScaledVector(right,joy.dx); }
  }
  if(move.lengthSq()>0) move.normalize();

  player.vel.addScaledVector(move, ACCEL*dt);
  player.vel.multiplyScalar(Math.max(0,1-DAMP*dt));
  if(player.vel.length()>SPEED) player.vel.setLength(SPEED);
  player.pos.addScaledVector(player.vel,dt);
  resolveCollision();
  camera.position.copy(player.pos);

  // visée centre (desktop verrouillé)
  if(locked){
    raycaster.setFromCamera({x:0,y:0},camera);
    const hits=raycaster.intersectObjects(interactables,false);
    const aim=hits.length&&hits[0].distance<6;
    crossEl.classList.toggle('aim',aim);
    if(aim&&highlighted!==hits[0].object){
      if(highlighted) highlighted.material.emissive.setHex(0x000000);
      highlighted=hits[0].object;
      highlighted.material.emissive=new THREE.Color('#e11d2a');
      highlighted.material.emissiveIntensity=0.18;
    } else if(!aim&&highlighted){
      highlighted.material.emissive.setHex(0x000000); highlighted=null;
    }
  }

  posEl.innerHTML=`<span>${player.pos.x.toFixed(1)}</span> / <span>${player.pos.z.toFixed(1)}</span>`;
  renderer.render(scene,camera);
}
animate();

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

/* =========================================================================
   DÉMARRAGE / UI
   ========================================================================= */
document.getElementById('storeName').firstChild.textContent=CONFIG.storeName;
document.getElementById('storeTag').textContent=CONFIG.tagline+' · 3D';
document.getElementById('startName').textContent=CONFIG.storeName;
document.getElementById('startSub').textContent=CONFIG.tagline+' — Showroom 3D';

// petite barre de chargement (le temps que tout soit prêt)
let prog=0;
const bar=document.querySelector('#loadbar i');
const hintEl=document.getElementById('startHint');
const li=setInterval(()=>{prog=Math.min(100,prog+18+Math.random()*20);bar.style.width=prog+'%';
  if(prog>=100){clearInterval(li);hintEl.textContent=isMobile?'Joystick pour avancer · glisser pour regarder':'Cliquez pour commencer la visite';}},120);

document.getElementById('enter').addEventListener('click',()=>{
  started=true;
  document.getElementById('start').classList.add('hide');
  document.getElementById('hud').classList.add('show');
  if(isMobile){ document.getElementById('touch').classList.add('on'); document.getElementById('cross').style.display='none'; }
  else { renderer.domElement.requestPointerLock(); }
});
</script>
