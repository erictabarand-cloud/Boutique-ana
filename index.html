<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Configurateur Magasin Boulanger 3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0b0c;--panel:rgba(13,14,16,.9);--line:rgba(255,255,255,.1);--txt:#f4f4f5;--z3:#d4d4d8;--z4:#a1a1aa;--z5:#71717a;--red:#e2001a;--red-soft:rgba(226,0,26,.16);--sans:'Saira',system-ui,sans-serif;--mono:'JetBrains Mono',ui-monospace,monospace;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);font-family:var(--mono);color:var(--txt);}
  canvas{display:block;}#app{position:fixed;inset:0;}button{font-family:var(--sans);cursor:pointer;}
  .logo{background:var(--red);color:#fff;font-family:var(--sans);font-weight:800;padding:5px 13px;border-radius:6px;text-transform:lowercase;line-height:1;display:inline-block;}

  /* Start */
  #start{position:fixed;inset:0;z-index:90;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(130% 120% at 50% 8%,#1a1c1f,#0a0b0d 55%,#050506);text-align:center;padding:24px;transition:opacity .5s;}
  #start.hide{opacity:0;pointer-events:none;}#start .logo{font-size:clamp(26px,6vw,52px);padding:8px 22px;border-radius:8px;}
  #start .sub{font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--z5);margin:22px 0 34px;}
  #enter{font-weight:600;font-size:14px;letter-spacing:.16em;text-transform:uppercase;color:#fff;background:var(--red);border:none;padding:16px 38px;border-radius:4px;transition:filter .2s,transform .2s;}
  #enter:hover{filter:brightness(1.12);transform:translateY(-1px);}#start .hint{margin-top:26px;font-size:10px;letter-spacing:.12em;color:var(--z5);line-height:2;text-transform:uppercase;}
  #loadbar{margin-top:18px;width:210px;height:2px;background:rgba(255,255,255,.08);overflow:hidden;border-radius:2px;}#loadbar i{display:block;height:100%;width:0;background:var(--red);transition:width .3s;}

  /* Top bar */
  #top{position:fixed;top:0;left:0;right:0;z-index:30;display:flex;justify-content:space-between;align-items:center;padding:12px 16px;gap:10px;background:linear-gradient(180deg,rgba(0,0,0,.6),transparent);pointer-events:none;}
  #top>*{pointer-events:auto;}#top .grp{display:flex;gap:8px;flex-wrap:wrap;}
  .tbtn{font-family:var(--sans);font-weight:500;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--z3);border:1px solid var(--line);background:var(--panel);backdrop-filter:blur(8px);padding:9px 12px;border-radius:6px;transition:all .2s;}
  .tbtn:hover{border-color:var(--z4);color:#fff;}.tbtn.on{border-color:var(--red);color:#fff;background:var(--red-soft);}
  .seg{display:flex;border:1px solid var(--line);border-radius:6px;overflow:hidden;background:var(--panel);backdrop-filter:blur(8px);}
  .seg button{font-family:var(--sans);font-weight:600;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--z4);background:transparent;border:none;padding:9px 16px;}
  .seg button.on{background:var(--red);color:#fff;}

  /* Palette */
  #palette{position:fixed;top:60px;left:12px;bottom:12px;width:230px;z-index:25;background:var(--panel);backdrop-filter:blur(16px);border:1px solid var(--line);border-radius:10px;display:flex;flex-direction:column;transition:transform .3s;}
  #palette.hide{transform:translateX(-260px);}
  #palette h4{font-family:var(--sans);font-weight:700;font-size:11px;letter-spacing:.18em;text-transform:uppercase;padding:14px 16px 8px;color:var(--z4);}
  #palette .scroll{flex:1;overflow-y:auto;padding:0 12px 12px;}
  .pcat{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--red);margin:14px 4px 8px;font-weight:600;}
  .pgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
  .pitem{font-family:var(--sans);font-size:11px;font-weight:500;color:var(--z3);background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:7px;padding:9px 7px;text-align:center;line-height:1.2;transition:all .15s;min-height:46px;display:flex;align-items:center;justify-content:center;}
  .pitem:hover{border-color:var(--z4);color:#fff;}.pitem.on{border-color:var(--red);background:var(--red-soft);color:#fff;}

  /* Object toolbar */
  #otb{position:fixed;z-index:28;display:none;gap:5px;transform:translate(-50%,-100%);}
  #otb.show{display:flex;}
  #otb button{width:36px;height:36px;border-radius:8px;border:1px solid var(--line);background:var(--panel);backdrop-filter:blur(8px);color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;}
  #otb button:hover{border-color:var(--red);}#otb button.del:hover{background:var(--red);}

  /* Hint */
  #hint{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:24;font-size:10px;letter-spacing:.08em;color:var(--z4);background:rgba(0,0,0,.4);backdrop-filter:blur(6px);padding:8px 16px;border-radius:20px;text-align:center;border:1px solid var(--line);pointer-events:none;max-width:90vw;}

  /* Visit HUD */
  .vis-only{display:none;}body.mode-visit .vis-only{display:block;}body.mode-visit #palette,body.mode-visit #otb,body.mode-visit #editTools{display:none!important;}
  body.mode-edit .vis-only{display:none;}
  .crosshair{position:fixed;top:50%;left:50%;width:8px;height:8px;margin:-4px 0 0 -4px;border-radius:50%;background:rgba(255,255,255,.85);box-shadow:0 0 0 2px rgba(0,0,0,.4);z-index:22;transition:transform .15s,background .15s;}
  .crosshair.aim{transform:scale(2);background:var(--red);}
  .vhint{position:fixed;bottom:14px;right:16px;z-index:22;font-size:10px;letter-spacing:.08em;color:var(--z5);text-align:right;line-height:1.8;text-transform:uppercase;}
  .vhint kbd{font-family:var(--mono);background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:3px;padding:1px 6px;color:var(--z3);}

  /* Fiche */
  #card{position:fixed;top:0;right:0;height:100%;width:340px;max-width:88vw;z-index:35;background:var(--panel);backdrop-filter:blur(20px);border-left:1px solid var(--line);transform:translateX(106%);transition:transform .4s cubic-bezier(.22,1,.36,1);display:flex;flex-direction:column;}
  #card.open{transform:translateX(0);}#card .close{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.45);border:1px solid var(--line);color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;}
  #card .body{padding:24px;flex:1;overflow-y:auto;}#card .cat{font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--red);margin-bottom:8px;}
  #card .name{font-family:var(--sans);font-weight:600;font-size:22px;line-height:1.15;margin-bottom:14px;}#card .price{font-family:var(--sans);font-weight:800;font-size:28px;}#card .price small{font-size:12px;color:var(--z5);font-weight:400;margin-left:6px;}
  #card .actions{padding:16px 24px;border-top:1px solid var(--line);}
  .btn-ghost{width:100%;padding:13px;background:transparent;border:1px solid var(--line);color:var(--txt);border-radius:5px;font-weight:600;font-size:12px;letter-spacing:.12em;text-transform:uppercase;}
  .btn-ghost[disabled]{opacity:.3;}.btn-ghost.act{border-color:var(--red);background:var(--red-soft);color:#fff;}

  /* Joystick */
  #joy{position:fixed;bottom:30px;left:24px;width:110px;height:110px;border-radius:50%;border:1px solid var(--line);background:rgba(255,255,255,.04);z-index:22;display:none;}
  body.mode-visit.touch #joy{display:block;}#joy .nub{position:absolute;top:50%;left:50%;width:44px;height:44px;margin:-22px 0 0 -22px;border-radius:50%;background:rgba(255,255,255,.16);border:1px solid var(--line);}

  @media(max-width:680px){#palette{width:180px;}.pgrid{grid-template-columns:1fr;}#top{padding:10px 12px;}.vhint{display:none;}}
</style>
</head>
<body class="mode-edit">
<div id="app"></div>

<div id="top">
  <div class="logo" style="font-size:17px">boulanger</div>
  <div class="seg" id="modeSeg"><button data-m="edit" class="on">Édition</button><button data-m="visit">Visite</button></div>
  <div class="grp" id="editTools">
    <button class="tbtn on" id="btnGrid">Grille</button>
    <button class="tbtn on" id="btnSnap">Aimant</button>
    <button class="tbtn" id="btnTop">Vue dessus</button>
    <button class="tbtn" id="btnExport">Exporter</button>
    <button class="tbtn" id="btnImport">Importer</button>
    <button class="tbtn" id="btnClear">Vider</button>
  </div>
</div>

<div id="palette">
  <h4>Bibliothèque</h4>
  <div class="scroll" id="palScroll"></div>
</div>

<div id="otb">
  <button id="otRotL" title="Pivoter">↺</button>
  <button id="otRotR" title="Pivoter">↻</button>
  <button id="otUp" title="Monter">▲</button>
  <button id="otDown" title="Descendre">▼</button>
  <button id="otDup" title="Dupliquer">⧉</button>
  <button class="del" id="otDel" title="Supprimer">🗑</button>
</div>

<div id="hint">Choisissez un élément, puis cliquez sur le sol pour le poser · Cliquez un objet pour le sélectionner et le déplacer</div>

<!-- Visite -->
<div class="crosshair vis-only" id="cross"></div>
<div class="vhint vis-only"><div><kbd>Z</kbd><kbd>Q</kbd><kbd>S</kbd><kbd>D</kbd> bouger · <kbd>Souris</kbd> regarder</div><div><kbd>Clic</kbd> inspecter · <kbd>Échap</kbd> sortir</div></div>
<div id="joy"><div class="nub" id="joyNub"></div></div>

<!-- Fiche -->
<div id="card">
  <button class="close" id="cardClose">✕</button>
  <div class="body"><div class="cat" id="cCat"></div><div class="name" id="cName"></div><div class="price" id="cPrice"></div></div>
  <div class="actions"><button class="btn-ghost" id="cOpen">Ouvrir / Fermer</button></div>
</div>

<input type="file" id="importFile" accept=".json" style="display:none">

<div id="start">
  <div class="logo">boulanger</div>
  <div class="sub">Configurateur de magasin 3D</div>
  <button id="enter">Démarrer →</button>
  <div class="hint" id="startHint">Chargement…</div>
  <div id="loadbar"><i></i></div>
</div>

<script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.161.0/build/three.module.js" } }</script>
<script type="module">
import * as THREE from 'three';
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const isMobile=matchMedia('(pointer:coarse)').matches||/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
if(isMobile)document.body.classList.add('touch');
const RED='#e2001a';

/* ===== RENDU ===== */
const app=document.getElementById('app');

const scene=new THREE.Scene();scene.background=new THREE.Color('#0c0d0e');
const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.05,300);
const renderer=new THREE.WebGLRenderer({antialias:true});

  for(const x of[-7,-2,3,8]){const p=new THREE.Mesh(new THREE.PlaneGeometry(2.6,10),lm);p.position.set(x,7.9,0);p.rotation.x=Math.PI/2;s.add(p);}
  scene.environment=pm.fromScene(s,0.04).texture;})();

/* ===== MATÉRIAUX ===== */
const MAT={inox:new THREE.MeshStandardMaterial({color:'#c4c9cf',metalness:.95,roughness:.34,envMapIntensity:1.1}),
  inoxDark:new THREE.MeshStandardMaterial({color:'#8d9298',metalness:.9,roughness:.4}),
  white:new THREE.MeshStandardMaterial({color:'#f2f3f4',metalness:.04,roughness:.42}),
  whiteSoft:new THREE.MeshStandardMaterial({color:'#e8eaec',roughness:.7}),
  pBlack:new THREE.MeshStandardMaterial({color:'#1b1c1e',metalness:.35,roughness:.45}),
  pDark:new THREE.MeshStandardMaterial({color:'#2a2c30',metalness:.3,roughness:.5}),
  pSilver:new THREE.MeshStandardMaterial({color:'#b9bdc2',metalness:.75,roughness:.32}),
  pWhite:new THREE.MeshStandardMaterial({color:'#eceef0',roughness:.5}),
  glass:new THREE.MeshStandardMaterial({color:'#cfe3ea',transparent:true,opacity:.18,roughness:.05}),
  ovenGlass:new THREE.MeshStandardMaterial({color:'#15171a',transparent:true,opacity:.85,roughness:.12,metalness:.4}),
  fridgeIn:new THREE.MeshStandardMaterial({color:'#eef1f2',roughness:.55}),
  ovenIn:new THREE.MeshStandardMaterial({color:'#23252a',roughness:.5}),
  metalIn:new THREE.MeshStandardMaterial({color:'#a9adb2',metalness:.7,roughness:.4}),
  handle:new THREE.MeshStandardMaterial({color:'#d6dadf',metalness:.95,roughness:.25}),
  grate:new THREE.MeshStandardMaterial({color:'#1c1d1f',metalness:.5,roughness:.5}),
  fabric:new THREE.MeshStandardMaterial({color:'#2a2b2d',roughness:.95}),
  wood:new THREE.MeshStandardMaterial({color:'#6b4f33',roughness:.6}),
  plinth:new THREE.MeshStandardMaterial({color:'#fbfbfc',roughness:.6}),
  red:new THREE.MeshStandardMaterial({color:RED,roughness:.5,metalness:.1}),
  screenOff:new THREE.MeshStandardMaterial({color:'#05070a',roughness:.2,metalness:.4})};
function M(g,m,x=0,y=0,z=0){const me=new THREE.Mesh(g,m);me.position.set(x,y,z);me.castShadow=true;me.receiveShadow=true;return me;}
const B=(w,h,d)=>new THREE.BoxGeometry(w,h,d), CY=(rt,rb,h,s=20,oe=false)=>new THREE.CylinderGeometry(rt,rb,h,s,1,oe);

/* ===== PUB ANIMÉE (TV) ===== */
const adCv=document.createElement('canvas');adCv.width=640;adCv.height=360;const ad=adCv.getContext('2d');
const adTex=new THREE.CanvasTexture(adCv);adTex.colorSpace=THREE.SRGBColorSpace;
function rr(c,X,Y,w,h,r){c.beginPath();c.moveTo(X+r,Y);c.arcTo(X+w,Y,X+w,Y+h,r);c.arcTo(X+w,Y+h,X,Y+h,r);c.arcTo(X,Y+h,X,Y,r);c.arcTo(X,Y,X+w,Y,r);c.closePath();}
const fade=(t,d)=>Math.min(1,Math.min(t,d-t)/0.45);
const scenes=[(t)=>{ad.fillStyle=RED;ad.fillRect(0,0,640,360);ad.globalAlpha=fade(t,3.2);const s=.7+Math.min(t,.6)/.6*.3;ad.fillStyle='#fff';ad.textAlign='center';ad.textBaseline='middle';ad.font=`800 ${64*s}px Saira,Arial`;ad.fillText('boulanger',320,150);ad.font='400 26px Saira,Arial';ad.fillText("L'univers de la tech",320,210);ad.globalAlpha=1;},
 (t)=>{ad.fillStyle='#f4f4f5';ad.fillRect(0,0,640,360);ad.globalAlpha=fade(t,3.4);ad.fillStyle='#111';ad.textAlign='center';ad.font='700 40px Saira,Arial';ad.fillText('TV OLED 4K 65"',320,95);const pop=clamp((t-.5)/.4,0,1);ad.save();ad.translate(320,210);ad.scale(.8+pop*.2,.8+pop*.2);ad.fillStyle=RED;rr(ad,-130,-40,260,80,14);ad.fill();ad.fillStyle='#fff';ad.font='800 50px Saira,Arial';ad.fillText('1 299 €',0,4);ad.restore();ad.fillStyle='#555';ad.font='400 18px Saira,Arial';ad.fillText('Disponible en magasin · TTC',320,290);ad.globalAlpha=1;},
 (t)=>{ad.fillStyle=RED;ad.fillRect(0,0,640,360);ad.globalAlpha=fade(t,3.4);ad.textAlign='center';ad.fillStyle='#fff';ad.font='800 70px Saira,Arial';ad.fillText('infinity',320,140);ad.font='400 26px Saira,Arial';ad.fillText('Réparé ou remplacé.',320,205);ad.fillText('La sérénité, incluse.',320,242);ad.globalAlpha=1;},
 (t)=>{ad.fillStyle='#0c0d0f';ad.fillRect(0,0,640,360);ad.globalAlpha=fade(t,3.4);ad.textAlign='center';ad.fillStyle='#fff';ad.font='800 72px Saira,Arial';ad.fillText('CLUB',236,150);ad.fillStyle=RED;ad.fillText('+',360,150);ad.fillStyle='#bbb';ad.font='400 24px Saira,Arial';ad.fillText('Avantages fidélité — gratuit',320,220);ad.globalAlpha=1;}];
const DUR=[3.2,3.4,3.4,3.4],TOT=DUR.reduce((a,b)=>a+b,0);
function drawAd(time){let tt=time%TOT,i=0;while(tt>DUR[i]){tt-=DUR[i];i++;}ad.globalAlpha=1;scenes[i](tt);adTex.needsUpdate=true;}
const adMat=new THREE.MeshBasicMaterial({map:adTex});
function sign(text,bg,fg){const c=document.createElement('canvas');c.width=1024;c.height=256;const x=c.getContext('2d');x.fillStyle=bg;x.fillRect(0,0,1024,256);x.fillStyle=fg;x.textAlign='center';x.textBaseline='middle';x.font='800 120px Saira,Arial';x.fillText(text,512,138);const t=new THREE.CanvasTexture(c);t.colorSpace=THREE.SRGBColorSpace;return new THREE.MeshBasicMaterial({map:t});}

/* ===== COQUE MAGASIN ===== */
const tile=(()=>{const c=document.createElement('canvas');c.width=c.height=512;const x=c.getContext('2d');x.fillStyle='#d9dadc';x.fillRect(0,0,512,512);for(let i=0;i<1500;i++){x.fillStyle=`rgba(150,150,155,${Math.random()*.1})`;x.fillRect(Math.random()*512,Math.random()*512,4,4);}x.strokeStyle='rgba(120,120,125,.4)';x.lineWidth=3;for(let p=0;p<=512;p+=128){x.beginPath();x.moveTo(p,0);x.lineTo(p,512);x.moveTo(0,p);x.lineTo(512,p);x.stroke();}const t=new THREE.CanvasTexture(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(11,8);t.colorSpace=THREE.SRGBColorSpace;return t;})();
const floor=new THREE.Mesh(new THREE.PlaneGeometry(W,D),new THREE.MeshPhysicalMaterial({map:tile,color:'#e2e3e5',roughness:.42,clearcoat:.4,clearcoatRoughness:.5}));
floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;scene.add(floor);
const ceil=new THREE.Mesh(new THREE.PlaneGeometry(W,D),new THREE.MeshStandardMaterial({color:'#15161a',roughness:.95}));ceil.rotation.x=Math.PI/2;ceil.position.y=H;scene.add(ceil);
const led=new THREE.MeshStandardMaterial({color:'#101012',emissive:'#fbf7ee',emissiveIntensity:.9});
for(let gx=-16;gx<=16;gx+=4)for(let gz=-12;gz<=12;gz+=4)scene.add(M(B(3,.05,.5),led,gx,H-.04,gz));
const wallMat=new THREE.MeshStandardMaterial({color:'#33353a',roughness:.92});
function wall(w,x,z,ry){const m=new THREE.Mesh(B(w,H,.25),wallMat);m.position.set(x,H/2,z);m.rotation.y=ry;m.receiveShadow=true;scene.add(m);}
wall(W,0,-HD,0);wall(D,-HW,0,Math.PI/2);wall(D,HW,0,Math.PI/2);wall(13,-HW+6.5,HD,0);wall(13,HW-6.5,HD,0);
scene.add(M(B(W,1.1,.25),wallMat,0,H-.55,HD));
for(const sx of[-7,7]){scene.add(M(B(8,H-1.1,.05),MAT.glass,sx,(H-1.1)/2,HD-.02));}
const ens=new THREE.Mesh(B(7,1.4,.1),sign('boulanger',RED,'#fff'));ens.position.set(0,H-.55,HD-.14);scene.add(ens);
scene.add(M(new THREE.PlaneGeometry(60,30),new THREE.MeshBasicMaterial({color:'#aeb8c4'}),0,8,HD+12));
const grd=M(new THREE.PlaneGeometry(60,30),new THREE.MeshStandardMaterial({color:'#4a4d52',roughness:1}),0,.005,HD+12);grd.rotation.x=-Math.PI/2;scene.add(grd);
const dPanels=[];for(const side of[-1,1]){const p=new THREE.Group();p.position.set(0,0,HD-.05);scene.add(p);p.add(M(B(1.9,H-1.3,.06),MAT.glass,side*.97,(H-1.3)/2,0));p.add(M(B(1.9,.1,.08),MAT.inoxDark,side*.97,.05,0));dPanels.push({g:p,side});}
scene.add(M(B(.12,H-1.1,.12),MAT.inoxDark,-2,(H-1.1)/2,HD));scene.add(M(B(.12,H-1.1,.12),MAT.inoxDark,2,(H-1.1)/2,HD));
scene.add(new THREE.HemisphereLight('#eef2f6','#3a3c40',.75));scene.add(new THREE.AmbientLight('#fff',.4));
const key=new THREE.DirectionalLight('#fff6ea',.8);key.position.set(8,14,12);
if(!isMobile){key.castShadow=true;key.shadow.mapSize.set(2048,2048);key.shadow.camera.near=1;key.shadow.camera.far=60;key.shadow.camera.left=-22;key.shadow.camera.right=22;key.shadow.camera.top=18;key.shadow.camera.bottom=-18;key.shadow.bias=-.0004;}
scene.add(key);const fillL=new THREE.DirectionalLight('#e8eef5',.45);fillL.position.set(-10,11,-8);scene.add(fillL);
// grille d'aide

let mode='edit',armed=null,selected=null,snapOn=true;
const objects=[],pick=[];
const ghostMat=new THREE.MeshBasicMaterial({color:0x33dd66,transparent:true,opacity:.42,depthWrite:false});
let ghost=null;
const box=new THREE.BoxHelper(floor,new THREE.Color(RED));box.visible=false;scene.add(box);

function buildNode(type){const r=FACT[type]();return r;}
function addObject(type,x,z,ry=0,h=0){const r=buildNode(type);r.group.position.set(x,r.base+h,z);r.group.rotation.y=ry;scene.add(r.group);
  const o={type,node:r.group,foot:r.foot,anims:r.anims,base:r.base,doorable:r.anims.length>0,x,z,ry,h,open:false,t:0};
  r.group.traverse(m=>{if(m.isMesh)m.userData.obj=o;});objects.push(o);rebuildPick();save();return o;}
function rebuildPick(){pick.length=0;for(const o of objects)o.node.traverse(m=>{if(m.isMesh)pick.push(m);});}
function removeObject(o){scene.remove(o.node);objects.splice(objects.indexOf(o),1);rebuildPick();if(selected===o)deselect();save();}
function clearAll(){for(const o of[...objects])scene.remove(o.node);objects.length=0;rebuildPick();deselect();save();}

/* ===== GHOST ===== */
function setGhost(type){clearGhost();if(!type)return;const r=FACT[type]();r.group.position.y=r.base;r.group.traverse(m=>{if(m.isMesh)m.material=ghostMat;});ghost={node:r.group,base:r.base};scene.add(r.group);}
function clearGhost(){if(ghost){scene.remove(ghost.node);ghost=null;}}
function moveGhost(nx,ny){if(!ghost)return;const p=floorPoint(nx,ny);if(!p)return;const s=snap(p.x,p.z);ghost.node.position.set(s.x,ghost.base,s.z);}

function select(o){selected=o;if(mode==='edit'){box.setFromObject(o.node);box.visible=true;document.getElementById('otb').classList.add('show');}else{if(o.anims.length)o.open=true;showCard(o);}}
function deselect(){selected=null;box.visible=false;document.getElementById('otb').classList.remove('show');}

/* ===== CAMÉRA ORBITALE (édition) ===== */
const orbit={target:new THREE.Vector3(0,.6,2),dist:24,az:Math.PI,polar:.95};
function applyOrbit(){const sp=Math.sin(orbit.polar),cp=Math.cos(orbit.polar);camera.position.set(orbit.target.x+orbit.dist*sp*Math.sin(orbit.az),orbit.target.y+orbit.dist*cp,orbit.target.z+orbit.dist*sp*Math.cos(orbit.az));camera.lookAt(orbit.target);}
const floorPlane=new THREE.Plane(new THREE.Vector3(0,1,0),0);const ray=new THREE.Raycaster(),tmp=new THREE.Vector3();
function floorPoint(nx,ny){ray.setFromCamera({x:nx,y:ny},camera);return ray.ray.intersectPlane(floorPlane,tmp)?tmp.clone():null;}
function snap(x,z){return snapOn?{x:Math.round(x*2)/2,z:Math.round(z*2)/2}:{x,z};}
function pickAt(nx,ny){ray.setFromCamera({x:nx,y:ny},camera);const h=ray.intersectObjects(pick,false);return h.length?h[0].object.userData.obj:null;}
function panBy(dx,dy){const f=new THREE.Vector3();camera.getWorldDirection(f);f.y=0;f.normalize();const r=new THREE.Vector3().crossVectors(f,new THREE.Vector3(0,1,0)).normalize();const k=orbit.dist*.0016;orbit.target.addScaledVector(r,-dx*k);orbit.target.addScaledVector(f,dy*k);}

/* ===== POINTEURS (édition) ===== */
const pts=new Map();let gesture=null,dragObj=null,down=null,pinch=null;
const ndc=e=>({x:(e.clientX/innerWidth)*2-1,y:-(e.clientY/innerHeight)*2+1});
canvas.addEventListener('pointerdown',e=>{if(mode!=='edit')return;canvas.setPointerCapture(e.pointerId);pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pts.size===1){down={x:e.clientX,y:e.clientY,moved:0,t:performance.now()};const n=ndc(e);
    if(armed){gesture='orbit';}else if(e.shiftKey){gesture='pan';}else{const hit=pickAt(n.x,n.y);if(hit){select(hit);dragObj=hit;gesture='move';}else gesture='orbit';}}
  else if(pts.size===2){const a=[...pts.values()];pinch={d:Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y),mx:(a[0].x+a[1].x)/2,my:(a[0].y+a[1].y)/2};gesture='pinch';}});
canvas.addEventListener('pointermove',e=>{if(mode!=='edit')return;const n=ndc(e);if(armed)moveGhost(n.x,n.y);
  if(!pts.has(e.pointerId))return;const prev=pts.get(e.pointerId);const dx=e.clientX-prev.x,dy=e.clientY-prev.y;pts.set(e.pointerId,{x:e.clientX,y:e.clientY});if(down)down.moved+=Math.abs(dx)+Math.abs(dy);
  if(gesture==='pinch'&&pts.size===2){const a=[...pts.values()];const d=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y),mx=(a[0].x+a[1].x)/2,my=(a[0].y+a[1].y)/2;orbit.dist=clamp(orbit.dist*pinch.d/d,6,46);panBy(mx-pinch.mx,my-pinch.my);pinch={d,mx,my};applyOrbit();}
  else if(gesture==='orbit'&&pts.size===1){orbit.az-=dx*.005;orbit.polar=clamp(orbit.polar-dy*.005,.12,1.5);applyOrbit();}
  else if(gesture==='pan'&&pts.size===1){panBy(dx,dy);applyOrbit();}
  else if(gesture==='move'&&dragObj){const p=floorPoint(n.x,n.y);if(p){const s=snap(p.x,p.z);dragObj.x=s.x;dragObj.z=s.z;dragObj.node.position.x=s.x;dragObj.node.position.z=s.z;box.update();}}});
canvas.addEventListener('pointerup',e=>{if(mode!=='edit')return;pts.delete(e.pointerId);const n=ndc(e);const tap=down&&down.moved<8&&performance.now()-down.t<500;
  if(pts.size===0){if(tap){if(armed){const p=floorPoint(n.x,n.y);if(p){const s=snap(p.x,p.z);select(addObject(armed,s.x,s.z));}}else{const hit=pickAt(n.x,n.y);if(hit)select(hit);else deselect();}}if(gesture==='move')save();gesture=null;dragObj=null;down=null;}
  else if(pts.size===1)gesture='orbit';});
canvas.addEventListener('wheel',e=>{if(mode!=='edit')return;e.preventDefault();orbit.dist=clamp(orbit.dist*(1+Math.sign(e.deltaY)*.1),6,46);applyOrbit();},{passive:false});

/* ===== TOOLBAR OBJET ===== */
const otb=document.getElementById('otb');
const refresh=()=>{box.update();};
document.getElementById('otRotL').onclick=()=>{if(!selected)return;selected.ry-=Math.PI/12;selected.node.rotation.y=selected.ry;refresh();save();};
document.getElementById('otRotR').onclick=()=>{if(!selected)return;selected.ry+=Math.PI/12;selected.node.rotation.y=selected.ry;refresh();save();};
document.getElementById('otUp').onclick=()=>{if(!selected)return;selected.h=clamp(selected.h+.1,0,3);selected.node.position.y=selected.base+selected.h;refresh();save();};
document.getElementById('otDown').onclick=()=>{if(!selected)return;selected.h=clamp(selected.h-.1,0,3);selected.node.position.y=selected.base+selected.h;refresh();save();};
document.getElementById('otDup').onclick=()=>{if(!selected)return;select(addObject(selected.type,selected.x+.7,selected.z+.7,selected.ry,selected.h));};
document.getElementById('otDel').onclick=()=>{if(selected)removeObject(selected);};

/* ===== PALETTE UI ===== */
const palScroll=document.getElementById('palScroll');
CATS.forEach(cat=>{const h=document.createElement('div');h.className='pcat';h.textContent=cat;palScroll.appendChild(h);
  const g=document.createElement('div');g.className='pgrid';palScroll.appendChild(g);
  Object.keys(PAL).filter(k=>PAL[k].c===cat).forEach(k=>{const b=document.createElement('button');b.className='pitem';b.textContent=PAL[k].l;b.dataset.k=k;
    b.onclick=()=>{if(armed===k){armed=null;b.classList.remove('on');setGhost(null);}else{document.querySelectorAll('.pitem.on').forEach(e=>e.classList.remove('on'));armed=k;b.classList.add('on');setGhost(k);deselect();}};g.appendChild(b);});});

/* ===== FICHE (visite) ===== */
const $=id=>document.getElementById(id);
function showCard(o){const m=PAL[o.type];$('cCat').textContent=m.c;$('cName').textContent=m.l;$('cPrice').innerHTML=m.p?m.p.toLocaleString('fr-FR')+' € <small>TTC</small>':'';
  const ob=$('cOpen');if(o.anims.length){ob.disabled=false;ob.classList.add('act');ob.textContent='Fermer';}else{ob.disabled=true;ob.classList.remove('act');ob.textContent='Pas d\'ouverture';}$('card').classList.add('open');}
$('cardClose').onclick=()=>{$('card').classList.remove('open');if(selected&&mode==='visit')selected.open=false;deselect();};
$('cOpen').onclick=function(){if(!selected||!selected.anims.length)return;selected.open=!selected.open;this.textContent=selected.open?'Fermer':'Ouvrir';};

/* ===== VISITE (FPS) ===== */
const player={pos:new THREE.Vector3(0,1.65,HD-3),vel:new THREE.Vector3(),yaw:0,pitch:0,radius:.38};
const keys={};let locked=false;const obst=[];
function buildObstacles(){obst.length=0;for(const o of objects){if(!PAL[o.type].solid)continue;const c=Math.abs(Math.cos(o.ry)),s=Math.abs(Math.sin(o.ry));const w=o.foot.w*c+o.foot.d*s,d=o.foot.w*s+o.foot.d*c;obst.push({minX:o.x-w/2,maxX:o.x+w/2,minZ:o.z-d/2,maxZ:o.z+d/2});}}
addEventListener('keydown',e=>keys[e.code]=true);addEventListener('keyup',e=>keys[e.code]=false);
canvas.addEventListener('click',()=>{if(mode==='visit'&&!isMobile&&!locked&&!$('card').classList.contains('open'))canvas.requestPointerLock();});
document.addEventListener('pointerlockchange',()=>locked=document.pointerLockElement===canvas);
document.addEventListener('mousemove',e=>{if(!locked)return;player.yaw-=e.movementX*.0022;player.pitch=clamp(player.pitch-e.movementY*.0022,-1.4,1.4);});
canvas.addEventListener('mousedown',()=>{if(mode==='visit'&&locked)castV(0,0);});
function castV(nx,ny){ray.setFromCamera({x:nx,y:ny},camera);const h=ray.intersectObjects(pick,false);if(h.length&&h[0].distance<7){if(!isMobile&&locked)document.exitPointerLock();select(h[0].object.userData.obj);}}
// joystick
const joy={a:false,id:null,cx:0,cy:0,dx:0,dy:0},joyEl=$('joy'),joyNub=$('joyNub');
const look={a:false,id:null,lx:0,ly:0,m:0,sx:0,sy:0,t:0};
addEventListener('touchstart',e=>{if(mode!=='visit')return;for(const t of e.changedTouches){const r=joyEl.getBoundingClientRect();if(t.clientX>=r.left-20&&t.clientX<=r.right+20&&t.clientY>=r.top-20&&t.clientY<=r.bottom+20&&!joy.a){joy.a=true;joy.id=t.identifier;joy.cx=r.left+r.width/2;joy.cy=r.top+r.height/2;jU(t.clientX,t.clientY);}else if(!look.a){look.a=true;look.id=t.identifier;look.lx=look.sx=t.clientX;look.ly=look.sy=t.clientY;look.m=0;look.t=performance.now();}}},{passive:false});
addEventListener('touchmove',e=>{if(mode!=='visit')return;for(const t of e.changedTouches){if(joy.a&&t.identifier===joy.id)jU(t.clientX,t.clientY);else if(look.a&&t.identifier===look.id){const dx=t.clientX-look.lx,dy=t.clientY-look.ly;player.yaw-=dx*.005;player.pitch=clamp(player.pitch-dy*.005,-1.4,1.4);look.lx=t.clientX;look.ly=t.clientY;look.m+=Math.abs(dx)+Math.abs(dy);}}},{passive:false});
addEventListener('touchend',e=>{if(mode!=='visit')return;for(const t of e.changedTouches){if(joy.a&&t.identifier===joy.id){joy.a=false;joy.dx=joy.dy=0;joyNub.style.transform='translate(0,0)';}else if(look.a&&t.identifier===look.id){look.a=false;if(look.m<12&&performance.now()-look.t<350)castV((look.sx/innerWidth)*2-1,-(look.sy/innerHeight)*2+1);}}});
function jU(px,py){let dx=px-joy.cx,dy=py-joy.cy;const m=42,d=Math.hypot(dx,dy);if(d>m){dx=dx/d*m;dy=dy/d*m;}joy.dx=dx/m;joy.dy=dy/m;joyNub.style.transform=`translate(${dx}px,${dy}px)`;}

/* ===== MODE SWITCH ===== */
function setMode(m){mode=m;document.body.className='mode-'+m+(isMobile?' touch':'');
  if(m==='visit'){armed=null;document.querySelectorAll('.pitem.on').forEach(e=>e.classList.remove('on'));setGhost(null);deselect();buildObstacles();player.pos.set(0,1.65,HD-3);player.yaw=0;player.pitch=0;$('card').classList.remove('open');}
  else{$('card').classList.remove('open');if(locked)document.exitPointerLock();deselect();applyOrbit();}}
document.querySelectorAll('#modeSeg button').forEach(b=>b.onclick=()=>{document.querySelectorAll('#modeSeg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');setMode(b.dataset.m);});

/* ===== OUTILS ÉDITION ===== */
$('btnGrid').onclick=function(){grid.visible=!grid.visible;this.classList.toggle('on',grid.visible);};
$('btnSnap').onclick=function(){snapOn=!snapOn;this.classList.toggle('on',snapOn);};
$('btnTop').onclick=()=>{orbit.polar=.18;orbit.az=Math.PI;orbit.dist=30;orbit.target.set(0,0,0);applyOrbit();};
$('btnClear').onclick=()=>{if(confirm('Vider tout le magasin ?'))clearAll();};
$('btnExport').onclick=()=>{const data=JSON.stringify(objects.map(o=>({t:o.type,x:o.x,z:o.z,ry:o.ry,h:o.h})));const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([data],{type:'application/json'}));a.download='magasin-boulanger-layout.json';a.click();};
$('btnImport').onclick=()=>$('importFile').click();
$('importFile').onchange=e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>{try{loadLayout(JSON.parse(rd.result));}catch(err){alert('Fichier invalide');}};rd.readAsText(f);};
function loadLayout(arr){clearAll();for(const o of arr)if(FACT[o.t])addObject(o.t,o.x,o.z,o.ry||0,o.h||0);}

/* ===== SAUVEGARDE LOCALE ===== */
function save(){try{localStorage.setItem('boulanger_cfg_v1',JSON.stringify(objects.map(o=>({t:o.type,x:o.x,z:o.z,ry:o.ry,h:o.h}))));}catch(e){}}
function loadSaved(){try{const s=localStorage.getItem('boulanger_cfg_v1');if(s){loadLayout(JSON.parse(s));return true;}}catch(e){}return false;}

/* ===== AGENCEMENT DE DÉPART ===== */
function starter(){addObject('caisse',9,12,0,0);addObject('totemPub',-3,12,0,0);
  addObject('gondolaLow',-3,5,0,0);addObject('gondolaLow',-3,8,0,0);addObject('gondolaHigh',3,6,0,0);
  addObject('meubleTV',0,-12,0,0);addObject('tv65',0,-12,0,1.3);
  addObject('fridgeUS',-14,-11,0,0);addObject('washer',-11,-11,0,0);
  addObject('podium',-10,9,0,0);addObject('phone',-10,9,0,.9);
  addObject('pubInfinity',6,2,0,0);}

/* ===== BOUCLE ===== */
const clock=new THREE.Clock();const fwd=new THREE.Vector3(),rgt=new THREE.Vector3(),up=new THREE.Vector3(0,1,0),mv=new THREE.Vector3();
const smooth=t=>t*t*(3-2*t);let frame=0,doorOpen=0,started=false;
function collide(){const r=player.radius;player.pos.x=clamp(player.pos.x,-HW+r,HW-r);player.pos.z=clamp(player.pos.z,-HD+r,HD-r);for(const o of obst){const a=o.minX-r,b=o.maxX+r,c=o.minZ-r,d=o.maxZ+r;if(player.pos.x>a&&player.pos.x<b&&player.pos.z>c&&player.pos.z<d){const dL=player.pos.x-a,dR=b-player.pos.x,dB=player.pos.z-c,dT=d-player.pos.z,mn=Math.min(dL,dR,dB,dT);if(mn===dL)player.pos.x=a;else if(mn===dR)player.pos.x=b;else if(mn===dB)player.pos.z=c;else player.pos.z=d;}}}
function loop(){requestAnimationFrame(loop);const dt=Math.min(clock.getDelta(),.05);frame++;
  if(mode==='visit'&&started){camera.rotation.set(player.pitch,player.yaw,0,'YXZ');camera.getWorldDirection(fwd);fwd.y=0;fwd.normalize();rgt.crossVectors(fwd,up).normalize();mv.set(0,0,0);
    if(!$('card').classList.contains('open')){if(keys['KeyW']||keys['KeyZ']||keys['ArrowUp'])mv.add(fwd);if(keys['KeyS']||keys['ArrowDown'])mv.sub(fwd);if(keys['KeyD']||keys['ArrowRight'])mv.add(rgt);if(keys['KeyA']||keys['KeyQ']||keys['ArrowLeft'])mv.sub(rgt);if(joy.a){mv.addScaledVector(fwd,-joy.dy);mv.addScaledVector(rgt,joy.dx);}}
    if(mv.lengthSq()>0)mv.normalize();player.vel.addScaledVector(mv,16*dt);player.vel.multiplyScalar(Math.max(0,1-11*dt));if(player.vel.length()>4.6)player.vel.setLength(4.6);player.pos.addScaledVector(player.vel,dt);collide();camera.position.copy(player.pos);
    const near=Math.hypot(player.pos.x,player.pos.z-(HD-.5))<4.5;doorOpen+=((near?1:0)-doorOpen)*Math.min(1,dt*4);for(const p of dPanels)p.g.position.x=p.side*doorOpen*1.9;
    if(locked&&frame%5===0){ray.setFromCamera({x:0,y:0},camera);const h=ray.intersectObjects(pick,false);$('cross').classList.toggle('aim',h.length&&h[0].distance<7);}}
  // animation portes
  for(const o of objects){const tg=o.open?1:0;if(o.t!==tg){o.t+=Math.sign(tg-o.t)*Math.min(Math.abs(tg-o.t),dt*2.4);const e=smooth(o.t);for(const an of o.anims){if(an.kind==='rotate')an.target.rotation[an.axis]=an.from+(an.to-an.from)*e;else an.target.position[an.axis]=an.from+(an.to-an.from)*e;}}}
  if(frame%2===0)drawAd(performance.now()/1000);
  if(mode==='edit'&&selected&&box.visible){box.update();const c=new THREE.Vector3(selected.x,selected.base+selected.h+ (selected.foot?0:0)+1.4,selected.z).project(camera);if(c.z<1){otb.style.left=((c.x*.5+.5)*innerWidth)+'px';otb.style.top=((-c.y*.5+.5)*innerHeight)+'px';otb.style.display='flex';}else otb.style.display='none';}
  renderer.render(scene,camera);}
loop();
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
addEventListener('keydown',e=>{if(e.code==='Escape'){if(armed){armed=null;document.querySelectorAll('.pitem.on').forEach(x=>x.classList.remove('on'));setGhost(null);}else{deselect();$('card').classList.remove('open');}}});

/* ===== INIT ===== */
applyOrbit();
if(!loadSaved())starter();

let prog=0;const bar=document.querySelector('#loadbar i'),hint=$('startHint');
const li=setInterval(()=>{prog=Math.min(100,prog+16+Math.random()*22);bar.style.width=prog+'%';if(prog>=100){clearInterval(li);hint.textContent='Cliquez pour commencer';}},100);
$('enter').onclick=()=>{started=true;$('start').classList.add('hide');setMode('edit');};
</script>
</body>
