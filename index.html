<style>

  .logo{background:var(--red);color:#fff;font-family:var(--sans);font-weight:800;padding:5px 13px;border-radius:6px;text-transform:lowercase;line-height:1;display:inline-block;}
  #start{position:fixed;inset:0;z-index:90;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(130% 120% at 50% 8%,#1a1c1f,#0a0b0d 55%,#050506);text-align:center;padding:24px;transition:opacity .5s;}
  #start.hide{opacity:0;pointer-events:none;}#start .logo{font-size:clamp(26px,6vw,52px);padding:8px 22px;border-radius:8px;}
  #start .sub{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--z5);margin:22px 0 34px;}
  #enter{font-weight:600;font-size:14px;letter-spacing:.16em;text-transform:uppercase;color:#fff;background:var(--red);border:none;padding:16px 38px;border-radius:4px;transition:filter .2s,transform .2s;}
  #enter:hover{filter:brightness(1.12);transform:translateY(-1px);}#start .hint{margin-top:26px;font-size:10px;letter-spacing:.1em;color:var(--z5);line-height:2;text-transform:uppercase;}
  #loadbar{margin-top:18px;width:210px;height:2px;background:rgba(255,255,255,.08);overflow:hidden;border-radius:2px;}#loadbar i{display:block;height:100%;width:0;background:var(--red);transition:width .3s;}
  #top{position:fixed;top:0;left:0;right:0;z-index:30;display:flex;justify-content:space-between;align-items:center;padding:11px 14px;gap:8px;background:linear-gradient(180deg,rgba(0,0,0,.6),transparent);pointer-events:none;flex-wrap:wrap;}
  #top>*{pointer-events:auto;}.grp{display:flex;gap:7px;flex-wrap:wrap;}
  .tbtn{font-family:var(--sans);font-weight:500;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--z3);border:1px solid var(--line);background:var(--panel);backdrop-filter:blur(8px);padding:9px 11px;border-radius:6px;transition:all .2s;}
  .tbtn:hover{border-color:var(--z4);color:#fff;}.tbtn.on{border-color:var(--red);color:#fff;background:var(--red-soft);}
  .seg{display:flex;border:1px solid var(--line);border-radius:6px;overflow:hidden;background:var(--panel);backdrop-filter:blur(8px);}
  .seg button{font-family:var(--sans);font-weight:600;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--z4);background:transparent;border:none;padding:9px 15px;}.seg button.on{background:var(--red);color:#fff;}
  #palette{position:fixed;top:58px;left:10px;bottom:10px;width:236px;z-index:25;background:var(--panel);backdrop-filter:blur(16px);border:1px solid var(--line);border-radius:10px;display:flex;flex-direction:column;}
  #palette h4{font-family:var(--sans);font-weight:700;font-size:11px;letter-spacing:.16em;text-transform:uppercase;padding:13px 14px 4px;color:var(--z4);}
  #palette .find{margin:0 12px 6px;}#palette .find input{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:6px;padding:8px 10px;color:#fff;font-family:var(--mono);font-size:11px;}

  .pcat{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);margin:12px 4px 7px;font-weight:600;}
  .pgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .pitem{font-family:var(--sans);font-size:10.5px;font-weight:500;color:var(--z3);background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:7px;padding:8px 6px;text-align:center;line-height:1.15;min-height:42px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .15s;}
  .pitem:hover{border-color:var(--z4);color:#fff;}.pitem.on{border-color:var(--red);background:var(--red-soft);color:#fff;}
  #colors{position:fixed;bottom:54px;left:50%;transform:translateX(-50%);z-index:26;display:none;gap:8px;align-items:center;background:var(--panel);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:30px;padding:8px 14px;}
  #colors.show{display:flex;}#colors .lab{font-family:var(--sans);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--z5);}
  .sw{width:24px;height:24px;border-radius:50%;border:2px solid rgba(255,255,255,.2);cursor:pointer;transition:transform .15s;}.sw:hover{transform:scale(1.15);}.sw.on{border-color:#fff;box-shadow:0 0 0 2px var(--red);}
  #otb{position:fixed;z-index:28;display:none;gap:5px;transform:translate(-50%,-100%);flex-wrap:wrap;justify-content:center;max-width:240px;}
  #otb.show{display:flex;}
  #otb button{width:34px;height:34px;border-radius:8px;border:1px solid var(--line);background:var(--panel);backdrop-filter:blur(8px);color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;}
  #otb button:hover{border-color:var(--red);}#otb button.del:hover{background:var(--red);}#otb button.hidden{display:none;}
  #hint{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:24;font-size:10px;letter-spacing:.06em;color:var(--z4);background:rgba(0,0,0,.42);backdrop-filter:blur(6px);padding:8px 16px;border-radius:20px;text-align:center;border:1px solid var(--line);pointer-events:none;max-width:92vw;}
  .vis-only{display:none;}body.mode-visit .vis-only{display:block;}body.mode-visit #palette,body.mode-visit #otb,body.mode-visit #editTools,body.mode-visit #colors{display:none!important;}
  .crosshair{position:fixed;top:50%;left:50%;width:8px;height:8px;margin:-4px 0 0 -4px;border-radius:50%;background:rgba(255,255,255,.85);box-shadow:0 0 0 2px rgba(0,0,0,.4);z-index:22;transition:transform .15s,background .15s;}.crosshair.aim{transform:scale(2);background:var(--red);}

  .panel.open{transform:translateX(0);}.panel .close{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.45);border:1px solid var(--line);color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;z-index:2;}
  .panel h3{font-family:var(--sans);font-weight:700;font-size:13px;letter-spacing:.18em;text-transform:uppercase;padding:22px 24px 14px;border-bottom:1px solid var(--line);}
  .panel .body{padding:18px 16px;flex:1;overflow-y:auto;}.panel .actions{padding:14px 20px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:10px;}
  #card .body{padding:24px;}#card .cat{font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--red);margin-bottom:8px;}#card .name{font-family:var(--sans);font-weight:600;font-size:22px;line-height:1.15;margin-bottom:14px;}#card .price{font-family:var(--sans);font-weight:800;font-size:28px;}#card .price small{font-size:12px;color:var(--z5);font-weight:400;margin-left:6px;}

  .btn-red{width:100%;padding:13px;background:var(--red);color:#fff;border:none;border-radius:5px;font-weight:700;font-size:12px;letter-spacing:.12em;text-transform:uppercase;transition:filter .2s;}.btn-red:hover{filter:brightness(1.12);}.btn-red[disabled]{opacity:.35;cursor:not-allowed;}
  #smColors{display:flex;gap:8px;justify-content:center;margin-bottom:6px;min-height:24px;}
  #joy{position:fixed;bottom:30px;left:24px;width:110px;height:110px;border-radius:50%;border:1px solid var(--line);background:rgba(255,255,255,.04);z-index:22;display:none;}body.mode-visit.touch #joy{display:block;}#joy .nub{position:absolute;top:50%;left:50%;width:44px;height:44px;margin:-22px 0 0 -22px;border-radius:50%;background:rgba(255,255,255,.16);border:1px solid var(--line);}
  @media(max-width:680px){#palette{width:172px;}.pgrid{grid-template-columns:1fr;}.vhint{display:none;}}
</style>

  <div class="logo" style="font-size:16px">boulanger</div>

let camLerp=1,cF=null,cT=null;function focusOn(o){const size=Math.max(o.foot.w,o.foot.d,1);cF={tx:orbit.target.x,ty:orbit.target.y,tz:orbit.target.z,dist:orbit.dist,polar:orbit.polar};cT={tx:o.x,ty:Math.max(.8,(o.h||1)*.5),tz:o.z,dist:clamp(size*2.6,4,11),polar:.92};camLerp=0;}

  if(pts.size===1){down={x:e.clientX,y:e.clientY,moved:0,t:performance.now()};const n=ndc(e);if(armed){gesture='orbit';}else if(e.shiftKey){gesture='pan';}else{const hit=pickAt(n.x,n.y);if(hit&&!hit.parent){select(hit);dragObj=hit;gesture='move';}else gesture='orbit';}}
  else if(pts.size===2){const a=[...pts.values()];pinch={d:Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y),mx:(a[0].x+a[1].x)/2,my:(a[0].y+a[1].y)/2};gesture='pinch';}});

  if(gesture==='pinch'&&pts.size===2){const a=[...pts.values()];const d=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y),mx=(a[0].x+a[1].x)/2,my=(a[0].y+a[1].y)/2;orbit.dist=clamp(orbit.dist*pinch.d/d,4,52);panBy(mx-pinch.mx,my-pinch.my);pinch={d,mx,my};applyOrbit();}

  else if(gesture==='move'&&dragObj){const p=floorPoint(n.x,n.y);if(p){const s=snap(p.x,p.z);dragObj.x=s.x;dragObj.z=s.z;dragObj.node.position.x=s.x;dragObj.node.position.z=s.z;box.update();refreshSlots();}}});

document.addEventListener('mousemove',e=>{if(!locked)return;player.yaw-=e.movementX*.0022;player.pitch=clamp(player.pitch-e.movementY*.0022,-1.4,1.4);});
canvas.addEventListener('mousedown',()=>{if(mode==='visit'&&locked)castV(0,0);});
function castV(nx,ny){ray.setFromCamera({x:nx,y:ny},camera);const h=ray.intersectObjects(pick,false);if(h.length&&h[0].distance<7){if(!isMobile&&locked)document.exitPointerLock();select(h[0].object.userData.obj);}}
const joy={a:false,id:null,cx:0,cy:0,dx:0,dy:0},joyEl=$('joy'),joyNub=$('joyNub'),look={a:false,id:null,lx:0,ly:0,m:0,sx:0,sy:0,t:0};
addEventListener('touchstart',e=>{if(mode!=='visit')return;for(const t of e.changedTouches){const r=joyEl.getBoundingClientRect();if(t.clientX>=r.left-20&&t.clientX<=r.right+20&&t.clientY>=r.top-20&&t.clientY<=r.bottom+20&&!joy.a){joy.a=true;joy.id=t.identifier;joy.cx=r.left+r.width/2;joy.cy=r.top+r.height/2;jU(t.clientX,t.clientY);}else if(!look.a){look.a=true;look.id=t.identifier;look.lx=look.sx=t.clientX;look.ly=look.sy=t.clientY;look.m=0;look.t=performance.now();}}},{passive:false});
addEventListener('touchmove',e=>{if(mode!=='visit')return;for(const t of e.changedTouches){if(joy.a&&t.identifier===joy.id)jU(t.clientX,t.clientY);else if(look.a&&t.identifier===look.id){const dx=t.clientX-look.lx,dy=t.clientY-look.ly;player.yaw-=dx*.005;player.pitch=clamp(player.pitch-dy*.005,-1.4,1.4);look.lx=t.clientX;look.ly=t.clientY;look.m+=Math.abs(dx)+Math.abs(dy);}}},{passive:false});
addEventListener('touchend',e=>{if(mode!=='visit')return;for(const t of e.changedTouches){if(joy.a&&t.identifier===joy.id){joy.a=false;joy.dx=joy.dy=0;joyNub.style.transform='translate(0,0)';}else if(look.a&&t.identifier===look.id){look.a=false;if(look.m<12&&performance.now()-look.t<350)castV((look.sx/innerWidth)*2-1,-(look.sy/innerHeight)*2+1);}}});
function jU(px,py){let dx=px-joy.cx,dy=py-joy.cy;const m=42,d=Math.hypot(dx,dy);if(d>m){dx=dx/d*m;dy=dy/d*m;}joy.dx=dx/m;joy.dy=dy/m;joyNub.style.transform=`translate(${dx}px,${dy}px)`;}

/* MODE */
function setMode(m){mode=m;document.body.className='mode-'+m+(isMobile?' touch':'');if(m==='visit'){armed=null;armedColor=null;document.querySelectorAll('.pitem.on').forEach(e=>e.classList.remove('on'));setGhost(null);deselect();hideColors();closeMenu();buildObstacles();player.pos.set(0,1.65,HD+5);player.yaw=0;player.pitch=0;$('card').classList.remove('open');}else{$('card').classList.remove('open');if(locked)document.exitPointerLock();deselect();applyOrbit();}}
document.querySelectorAll('#modeSeg button').forEach(b=>b.onclick=()=>{document.querySelectorAll('#modeSeg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');setMode(b.dataset.m);});

/* OUTILS */
$('btnGrid').onclick=function(){grid.visible=!grid.visible;this.classList.toggle('on',grid.visible);};
$('btnSnap').onclick=function(){snapOn=!snapOn;this.classList.toggle('on',snapOn);};
$('btnTags').onclick=function(){showTags=!showTags;this.classList.toggle('on',showTags);priceTags.forEach(t=>t.visible=showTags);};
$('btnTop').onclick=()=>{orbit.polar=.2;orbit.az=Math.PI;orbit.dist=36;orbit.target.set(0,0,0);camLerp=1;applyOrbit();refreshSlots();};
$('btnClear').onclick=()=>{if(confirm('Vider tout le magasin ?'))clearAll();};
$('btnExport').onclick=()=>{const arr=objects.filter(o=>!o.parent).map(o=>({t:o.type,x:o.x,z:o.z,ry:o.ry,h:o.h,c:o.color,sh:o.shelves,ch:Object.keys(o.occ).map(k=>({t:o.occ[k].type,i:+k,c:o.occ[k].color}))}));const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(arr)],{type:'application/json'}));a.download='magasin-boulanger.json';a.click();};
$('btnImport').onclick=()=>$('importFile').click();
$('importFile').onchange=e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>{try{loadLayout(JSON.parse(rd.result));}catch(err){alert('Fichier invalide');}};rd.readAsText(f);};
function loadLayout(arr){clearAll();for(const o of arr){if(!T[o.t])continue;const disp=addFloor(o.t,o.x,o.z,o.ry||0,o.h||0,o.c);if(o.sh&&disp.shelves!=null&&o.sh!==disp.shelves){while(disp.shelves<o.sh){selected=disp;changeShelves(1);}while(disp.shelves>o.sh){selected=disp;changeShelves(-1);}}if(o.ch)for(const ch of o.ch)if(T[ch.t]&&disp.slots&&disp.slots[ch.i])addToSlot(ch.t,disp,ch.i,ch.c);}deselect();}
function save(){try{const arr=objects.filter(o=>!o.parent).map(o=>({t:o.type,x:o.x,z:o.z,ry:o.ry,h:o.h,c:o.color,sh:o.shelves,ch:Object.keys(o.occ).map(k=>({t:o.occ[k].type,i:+k,c:o.occ[k].color}))}));localStorage.setItem('boulanger_pro_v3',JSON.stringify(arr));}catch(e){}}
function loadSaved(){try{const s=localStorage.getItem('boulanger_pro_v3');if(s){loadLayout(JSON.parse(s));return true;}}catch(e){}return false;}

/* EXEMPLE */
function starter(){const g1=addFloor('gondolaHigh',-3,4,0,0);addToSlot('cafe',g1,0);addToSlot('blender',g1,2);addToSlot('broyeur',g1,5);
  const t1=addFloor('appleTotem',-8,8,0,0);addToSlot('laptop',t1,0);addToSlot('imac',t1,1);addToSlot('phone',t1,2);
  const tv1=addFloor('tvUnit',0,-12,0,0);addToSlot('tv77',tv1,0);addToSlot('soundbar',tv1,1);
  const ow=addFloor('ovenWall12',8,-12.5,0,0);addToSlot('ovenBuiltin',ow,0);addToSlot('ovenBuiltin',ow,5);addToSlot('fourVapeur',ow,11);
  const mc=addFloor('meubleCuisine',13,-8,0,0);addToSlot('plaqueInduction',mc,0);addToSlot('lvEncastrable',mc,1);
  const ga=addFloor('gondolaAcc',4,8,0,0);addToSlot('coque',ga,0);addToSlot('chargeur',ga,5);addToSlot('cable',ga,10);
  addFloor('caisse',11,12,0,0);addFloor('fridgeUS',-15,-11,0,0,'#c4c9cf');addFloor('washer',-12,-11,0,0,'#f2f3f4');addFloor('chestM',-9,-11,0,0,'#f2f3f4');
  const d1=addFloor('dysonStand',-13,8,0,0);addToSlot('dysonFan',d1,0);addToSlot('dysonStick',d1,1);
  addFloor('scooter',16,9,.5,0,'#c62828');addFloor('barbecue',16,12,0,0,'#1f2024');addFloor('pubInf',6,1,0,0);deselect();}

/* BOUCLE */
const clock=new THREE.Clock();const fwd=new THREE.Vector3(),rgt=new THREE.Vector3(),up=new THREE.Vector3(0,1,0),mv=new THREE.Vector3();let frame=0,doorOpen=0,started=false;const otb=$('otb');
function collide(){const r=player.radius;player.pos.x=clamp(player.pos.x,-HW+r,HW-r);player.pos.z=clamp(player.pos.z,-HD+r,HD+8);for(const o of obst){const a=o.minX-r,b=o.maxX+r,c=o.minZ-r,d=o.maxZ+r;if(player.pos.x>a&&player.pos.x<b&&player.pos.z>c&&player.pos.z<d){const dL=player.pos.x-a,dR=b-player.pos.x,dB=player.pos.z-c,dT=d-player.pos.z,mn=Math.min(dL,dR,dB,dT);if(mn===dL)player.pos.x=a;else if(mn===dR)player.pos.x=b;else if(mn===dB)player.pos.z=c;else player.pos.z=d;}}}
function loop(){requestAnimationFrame(loop);const dt=Math.min(clock.getDelta(),.05);frame++;
  if(mode==='edit'&&camLerp<1&&cF&&cT){camLerp=Math.min(1,camLerp+dt*2.4);const e=smooth(camLerp);orbit.target.set(lerp(cF.tx,cT.tx,e),lerp(cF.ty,cT.ty,e),lerp(cF.tz,cT.tz,e));orbit.dist=lerp(cF.dist,cT.dist,e);orbit.polar=lerp(cF.polar,cT.polar,e);applyOrbit();refreshSlots();}
  if(mode==='visit'&&started){camera.rotation.set(player.pitch,player.yaw,0,'YXZ');camera.getWorldDirection(fwd);fwd.y=0;fwd.normalize();rgt.crossVectors(fwd,up).normalize();mv.set(0,0,0);
    if(!$('card').classList.contains('open')){if(keys['KeyW']||keys['KeyZ']||keys['ArrowUp'])mv.add(fwd);if(keys['KeyS']||keys['ArrowDown'])mv.sub(fwd);if(keys['KeyD']||keys['ArrowRight'])mv.add(rgt);if(keys['KeyA']||keys['KeyQ']||keys['ArrowLeft'])mv.sub(rgt);if(joy.a){mv.addScaledVector(fwd,-joy.dy);mv.addScaledVector(rgt,joy.dx);}}
    if(mv.lengthSq()>0)mv.normalize();player.vel.addScaledVector(mv,16*dt);player.vel.multiplyScalar(Math.max(0,1-11*dt));if(player.vel.length()>4.6)player.vel.setLength(4.6);player.pos.addScaledVector(player.vel,dt);collide();camera.position.copy(player.pos);
    const near=Math.hypot(player.pos.x,player.pos.z-(HD-.5))<4.8;doorOpen+=((near?1:0)-doorOpen)*Math.min(1,dt*4);for(const p of dPanels)p.g.position.x=p.side*doorOpen*1.9;
    if(locked&&frame%5===0){ray.setFromCamera({x:0,y:0},camera);const h=ray.intersectObjects(pick,false);$('cross').classList.toggle('aim',h.length&&h[0].distance<7);}}
  for(const o of objects){const tg=o.open?1:0;if(o.t!==tg){o.t+=Math.sign(tg-o.t)*Math.min(Math.abs(tg-o.t),dt*2.4);const e=smooth(o.t);for(const an of o.anims){if(an.kind==='rotate')an.target.rotation[an.axis]=an.from+(an.to-an.from)*e;else an.target.position[an.axis]=an.from+(an.to-an.from)*e;}}}
  if(frame%2===0)drawAd(performance.now()/1000);
  if(mode==='edit'&&selected&&box.visible){box.update();const c=new THREE.Vector3(selected.x,(selected.h||0)+Math.min(2.6,(selected.foot?selected.foot.w:1)*.5)+1.1,selected.z).project(camera);if(c.z<1){otb.style.left=clamp((c.x*.5+.5)*innerWidth,120,innerWidth-120)+'px';otb.style.top=clamp((-c.y*.5+.5)*innerHeight,72,innerHeight-60)+'px';otb.style.display='flex';}else otb.style.display='none';}
  renderer.render(scene,camera);}
loop();
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
addEventListener('keydown',e=>{if(e.code==='Escape'){if(menuOpen)closeMenu();else if(armed){armed=null;armedColor=null;document.querySelectorAll('.pitem.on').forEach(x=>x.classList.remove('on'));setGhost(null);hideColors();}else{deselect();$('card').classList.remove('open');}}});

/* INIT */
applyOrbit();if(!loadSaved())starter();
let prog=0;const bar=document.querySelector('#loadbar i'),hint=$('startHint');const li=setInterval(()=>{prog=Math.min(100,prog+16+Math.random()*22);bar.style.width=prog+'%';if(prog>=100){clearInterval(li);hint.textContent='Cliquez pour commencer';}},100);
$('enter').onclick=()=>{started=true;$('start').classList.add('hide');setMode('edit');};
</script>
</body>
